site_name: bijux-atlas
site_description: bijux-atlas documentation
site_url: https://bijux.github.io/bijux-atlas/
repo_name: bijux/bijux-atlas
repo_url: https://github.com/bijux/bijux-atlas
edit_uri: edit/main/docs/
strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000
docs_dir: docs
site_dir: artifacts/docs/site

validation:
  omitted_files: ignore

exclude_docs: |
  automation/**
  README.md

theme:
  name: material
  logo: assets/bijux_logo_hq.png
  favicon: assets/bijux_icon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - navigation.footer
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

not_in_nav: |
  assets/**
  automation/**
  overrides/**

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Introduction:
      - Overview: 01-introduction/index.md
      - What Atlas Is: 01-introduction/what-atlas-is.md
      - Core Concepts: 01-introduction/core-concepts.md
      - Boundaries and Non-Goals: 01-introduction/boundaries-and-non-goals.md
      - Guarantees and Stability: 01-introduction/guarantees-and-stability.md
  - Getting Started:
      - Overview: 02-getting-started/index.md
      - Install and Verify: 02-getting-started/install-and-verify.md
      - Run Atlas Locally: 02-getting-started/run-atlas-locally.md
      - Load a Sample Dataset: 02-getting-started/load-a-sample-dataset.md
      - Start the Server: 02-getting-started/start-the-server.md
      - Run Your First Queries: 02-getting-started/run-your-first-queries.md
