site_name: bijux-atlas
site_description: bijux-atlas reference documentation
site_url: https://bijux.github.io/bijux-atlas/
repo_name: bijux/bijux-atlas
repo_url: https://github.com/bijux/bijux-atlas
edit_uri: edit/main/docs/
strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000
docs_dir: docs
site_dir: artifacts/docs/site

validation:
  omitted_files: ignore

exclude_docs: |
  _drafts/**
  README.md

theme:
  name: material
  custom_dir: docs/_internal/overrides
  logo: _assets/bijux_logo_hq.png
  favicon: _assets/bijux_icon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - announce.dismiss
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - navigation.footer
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - git-revision-date-localized:
      type: date
      enable_creation_date: false
      fallback_to_build_date: false
      strict: false
  - redirects:
      # redirect_maps generated from docs/redirects.json; run bijux-dev-atlas docs redirects sync --allow-write
      redirect_maps:
        _generated/governance-audit/index.md: _internal/generated/governance-audit/index.md
        _generated/topic-index.md: _internal/generated/topic-index.md
        architecture/faq.md: product/faq.md
        contracts/breaking-change-examples.md: _internal/governance/contract-breaking-change-examples.md
        contracts/compatibility.md: reference/contracts/compatibility.md
        contracts/contract-change-checklist.md: _internal/governance/contract-change-checklist.md
        contracts/endpoints.md: reference/contracts/endpoints.md
        contracts/errors.md: reference/contracts/errors.md
        contracts/index.md: reference/contracts/index.md
        contracts/metrics.md: reference/contracts/telemetry.md
        contracts/plugin/index.md: reference/contracts/plugins/index.md
        contracts/plugin/mode.md: reference/contracts/plugins/mode.md
        contracts/plugin/spec.md: reference/contracts/plugins/spec.md
        contracts/ssot-workflow.md: _internal/governance/contract-ssot-workflow.md
        contracts/tracing.md: reference/contracts/telemetry.md
        control-plane/add-a-check-in-30-minutes.md: control-plane/extend-control-plane.md
        control-plane/add-a-contract-registry-in-30-minutes.md: control-plane/extend-control-plane.md
        control-plane/contracts.md: control-plane/index.md
        control-plane/ops-boundary.md: control-plane/index.md
        dev/check-failures.md: development/debugging-locally.md
