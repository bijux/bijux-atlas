INHERIT: mkdocs.shared.yml

site_name: Bijux Atlas
site_description: Genomics dataset delivery docs for GFF3 and FASTA ingest, immutable gene-query artifacts, runtime APIs, and repository operations.
site_url: !ENV [SITE_URL, https://bijux.io/bijux-atlas/]
site_author: Bijan Mousavi <bijan@bijux.io>
repo_name: bijux/bijux-atlas
repo_url: https://github.com/bijux/bijux-atlas
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: artifacts/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - mkdocs.yml
  - mkdocs.shared.yml
  - docs/hooks

exclude_docs: |
  _drafts/**
  automation/**
  README.md

plugins:
  - social:
      enabled: !ENV [ENABLE_SOCIAL_CARDS, false]
      cache_dir: artifacts/docs/.cache/social
  - redirects:
      # redirect_maps generated from configs/sources/repository/docs/redirects.json; run bijux-dev-atlas docs redirects sync --allow-write
      redirect_maps:
        contracts/compatibility.md: 08-contracts/ownership-and-versioning.md
        maintainer/index.md: 06-development/index.md
        maintainer/packages/bijux-dev-atlas/index.md: 06-development/automation-control-plane.md
        repository/index.md: 05-architecture/source-layout-and-ownership.md
        repository/packages/index.md: 05-architecture/source-layout-and-ownership.md
        root/compatibility-policy.md: 08-contracts/ownership-and-versioning.md
        runtime/index.md: 01-introduction/index.md
        runtime/packages/bijux-atlas/index.md: 05-architecture/source-layout-and-ownership.md
      # end generated redirect_maps

not_in_nav: |
  assets/**
  automation/**
  overrides/**

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/navigation-sync.js
  - assets/javascripts/external-links.js

extra:
  bijux:
    repository: bijux-atlas
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

