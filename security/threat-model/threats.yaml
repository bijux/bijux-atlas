schema_version: 1
threats:
  - id: SEC-THREAT-RUNTIME-SPOOF
    category: spoofing
    title: Untrusted client attempts to impersonate an allowed caller at the HTTP boundary.
    severity: high
    likelihood: medium
    affected_component: runtime_api
    mitigations:
      - MIT-HTTP-BOUNDARY
      - MIT-OBS-EVIDENCE
      - MIT-AUTH-MODEL
    residual_risk: Public endpoints still receive malformed traffic and depend on layered controls.
  - id: SEC-THREAT-UNAUTHENTICATED-ACCESS
    category: elevation-of-privilege
    title: Atlas is exposed beyond a trusted boundary without an enforced authentication layer.
    severity: high
    likelihood: medium
    affected_component: runtime_api
    mitigations:
      - MIT-AUTH-MODEL
    residual_risk: Misconfigured perimeter controls can still expose Atlas until deployment review catches the drift.
  - id: SEC-THREAT-SECRETS-LEAK
    category: information-disclosure
    title: Secrets leak through logs, reports, or release evidence.
    severity: high
    likelihood: medium
    affected_component: runtime_secrets
    mitigations:
      - MIT-SECRET-REDACTION
      - MIT-EVIDENCE-SCAN
    residual_risk: Operators can still introduce new secret formats before policies are updated.
  - id: SEC-THREAT-ARTIFACT-TAMPER
    category: tampering
    title: Generated evidence or release artifacts are modified after creation.
    severity: high
    likelihood: low
    affected_component: release_evidence
    mitigations:
      - MIT-EVIDENCE-INTEGRITY
    residual_risk: Consumers must still verify evidence before deployment.
  - id: SEC-THREAT-DEPENDENCY-OUTAGE
    category: denial-of-service
    title: Dependency failure causes readiness or serving degradation beyond documented behavior.
    severity: medium
    likelihood: medium
    affected_component: dataset_cache
    mitigations:
      - MIT-READINESS-CONTRACT
      - MIT-DRILL-COVERAGE
    residual_risk: Infrastructure-level failures can still exceed local recovery budgets.
  - id: SEC-THREAT-AUDIT-TAMPER
    category: tampering
    title: Audit verification artifacts are changed after capture to hide operator activity.
    severity: high
    likelihood: low
    affected_component: audit_pipeline
    mitigations:
      - MIT-AUDIT-VERIFICATION
    residual_risk: Reviewers still need to verify the signed evidence bundle before relying on it.
  - id: SEC-THREAT-AUDIT-BYPASS
    category: repudiation
    title: Runtime changes bypass governed audit fields or emit unclassified log fields.
    severity: high
    likelihood: medium
    affected_component: audit_pipeline
    mitigations:
      - MIT-AUDIT-FIELD-GOVERNANCE
    residual_risk: Manual log statements outside the governed helpers still require reviewer attention.
  - id: SEC-THREAT-AUDIT-LOSS
    category: denial-of-service
    title: Local audit files are lost because retention and rotation were not configured for the deployment.
    severity: medium
    likelihood: medium
    affected_component: audit_pipeline
    mitigations:
      - MIT-AUDIT-RETENTION
    residual_risk: Local storage failure can still remove unsent file-sink events before export.
