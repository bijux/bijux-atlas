name: Security Advisory Intake
description: Intake template for coordinating a security advisory publication
title: "security: advisory <id>"
labels: [security]
body:
  - type: input
    id: advisory_id
    attributes:
      label: Advisory ID
      placeholder: GHSA-xxxx-xxxx-xxxx
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: affected_surface
    attributes:
      label: Affected surface
      options:
        - bijux-atlas CLI
        - bijux-atlas-server
        - bijux-atlas-openapi
        - bijux dev atlas
        - bijux atlas umbrella route
        - docs, configs, or release automation surface
    validations:
      required: true
  - type: input
    id: install_route
    attributes:
      label: Install route or runtime path
      placeholder: cargo install, bijux install, source checkout, container image, or other route
  - type: input
    id: affected_versions
    attributes:
      label: Affected versions
      placeholder: ">=0.1.0, <0.1.5"
    validations:
      required: true
  - type: input
    id: fixed_version
    attributes:
      label: Fixed version
      placeholder: 0.1.5
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and attacker capability
      description: Describe what an attacker can do and what access or trust boundary is required.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or proof of concept
      description: Include private reproduction steps, affected configuration, or a safe proof of concept.
