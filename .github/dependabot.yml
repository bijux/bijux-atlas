version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: 18000
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch
      rust-major:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: 19800
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch
      github-actions-major:
        update-types:
          - major

  - package-ecosystem: npm
    directory: "/configs/sources/repository/docs"
    schedule:
      interval: weekly
      day: monday
      time: 21600
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docs-deps)"
    groups:
      docs-tooling-minor-patch:
        update-types:
          - minor
          - patch
      docs-tooling-major:
        update-types:
          - major

  - package-ecosystem: pip
    directory: "/configs/sources/repository/docs"
    schedule:
      interval: weekly
      day: monday
      time: 22500
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docs-python)"
    groups:
      docs-python-minor-patch:
        update-types:
          - minor
          - patch
      docs-python-major:
        update-types:
          - major
