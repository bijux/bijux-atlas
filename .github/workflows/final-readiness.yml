name: final-readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/bijux-dev-atlas/src/application/audit.rs"
      - "crates/bijux-dev-atlas/src/application/docs/**"
      - "configs/sources/governance/audit/**"
      - "docs/bijux-atlas-dev/delivery/**"
      - "docs/bijux-atlas-ops/**"
      - ".github/workflows/final-readiness.yml"

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Build audit and readiness artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/system/simulation artifacts/audit
          cargo run --locked -q -p bijux-dev-atlas -- system simulate suite --output-format json > artifacts/system/simulation/run.json
          cargo run --locked -q -p bijux-dev-atlas -- docs health-dashboard --allow-write --format json > artifacts/audit/docs-health.json
          cargo run --locked -q -p bijux-dev-atlas -- governance validate --output-format json > artifacts/audit/governance-validate.json || true
          cargo run --locked -q -p bijux-dev-atlas -- audit bundle generate --output-format json > artifacts/audit/generate.json
          cargo run --locked -q -p bijux-dev-atlas -- audit compliance report --output-format json > artifacts/audit/compliance.json
          cargo run --locked -q -p bijux-dev-atlas -- audit readiness validate --output-format json > artifacts/audit/readiness.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: final-readiness-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/audit
          retention-days: 14
