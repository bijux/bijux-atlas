name: Load System CI

on:
  pull_request:
    paths:
      - "ops/load/**"
      - "docs/operations/load/**"
      - "crates/bijux-dev-atlas/tests/load_suite_coverage.rs"
      - ".github/workflows/load-system-ci.yml"
  push:
    branches: [main]
    paths:
      - "ops/load/**"
      - "docs/operations/load/**"
      - "crates/bijux-dev-atlas/tests/load_suite_coverage.rs"
      - ".github/workflows/load-system-ci.yml"

jobs:
  load-contracts-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate load JSON contracts
        run: |
          jq . ops/load/suites/suites.json > /dev/null
          jq . ops/load/contracts/k6-thresholds.v1.json > /dev/null
          jq . ops/load/contracts/load-report.schema.json > /dev/null
          jq . ops/load/contracts/load-summary.schema.json > /dev/null
          jq . ops/load/generated/load-summary.json > /dev/null
          jq . ops/load/generated/load-drift-report.json > /dev/null
          jq . ops/load/generated/system-load-summary.json > /dev/null

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Validate load comparison via control-plane command
        run: |
          cargo run -p bijux-dev-atlas -- \
            perf diff \
            ops/load/baselines/system-load-baseline.json \
            ops/load/baselines/system-load-baseline.json \
            --format json > /tmp/load-diff.json
          jq . /tmp/load-diff.json > /dev/null

      - name: Run load suite coverage regression test
        run: cargo test -p bijux-dev-atlas --test load_suite_coverage --locked -- --nocapture

      - name: Run load reproducibility regression test
        run: cargo test -p bijux-dev-atlas --test load_reproducibility_regression --locked -- --nocapture
