name: compatibility-matrix

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ISO_ROOT: ${{ github.workspace }}/artifacts/isolates/compatibility-matrix
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/compatibility-matrix
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/compatibility-matrix
      TMPDIR: ${{ github.workspace }}/artifacts/isolates/compatibility-matrix/tmp
      TMP: ${{ github.workspace }}/artifacts/isolates/compatibility-matrix/tmp
      TEMP: ${{ github.workspace }}/artifacts/isolates/compatibility-matrix/tmp
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - name: Run docs validation advisory gate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/compatibility-matrix
          set +e
          cargo run --locked -q -p bijux-dev-atlas -- docs validate --format json > artifacts/compatibility-matrix/docs-validate.json
          docs_exit=$?
          set -e
          if [[ "${docs_exit}" -ne 0 ]]; then
            printf '{"schema_version":1,"status":"warn","text":"docs validate reported non-zero exit","exit_code":%s}\n' "${docs_exit}" > artifacts/compatibility-matrix/docs-validate-gate.json
          else
            printf '{"schema_version":1,"status":"ok","text":"docs validate passed","exit_code":0}\n' > artifacts/compatibility-matrix/docs-validate-gate.json
          fi
      - name: Refresh compatibility matrix artifacts
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- release ops compatibility-matrix --allow-write --format json > artifacts/compatibility-matrix/release-ops-compatibility-matrix.json
      - name: Detect matrix diff
        id: matrix-diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          fi
      - name: Create compatibility matrix PR
        if: steps.matrix-diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          commit-message: "docs(compatibility): refresh umbrella-atlas matrix for ${GITHUB_REF_NAME}"
          title: "docs: refresh compatibility matrix for ${GITHUB_REF_NAME}"
          body: "Automated compatibility matrix update for release ${GITHUB_REF_NAME}."
          branch: "automation/compat-matrix-${{ github.ref_name }}"
          delete-branch: true
