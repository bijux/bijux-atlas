name: security-threat-model-validation

on:
  pull_request:
    paths:
      - "ops/security/threat-model/**"
      - "crates/bijux-dev-atlas/src/application/security.rs"
      - "crates/bijux-dev-atlas/src/domains/security/**"
      - "crates/bijux-dev-atlas/src/interfaces/cli/mod.rs"
      - "docs/04-operations/security-operations.md"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Threat model command verification
        run: |
          cargo run --locked -p bijux-dev-atlas -- security threats verify --format json
      - name: Threat model governance tests
        run: |
          cargo test --locked -p bijux-dev-atlas threat_model_governance_contracts -- --nocapture
