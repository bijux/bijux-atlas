name: security-threat-model-validation

on:
  pull_request:
    paths:
      - "security/threat-model/**"
      - "crates/bijux-dev-atlas/src/commands/security.rs"
      - "crates/bijux-dev-atlas/src/cli/mod.rs"
      - "crates/bijux-dev-atlas/tests/threat_model_governance_contracts.rs"
      - "docs/operations/security/**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Threat model command verification
        run: |
          cargo run --locked -p bijux-dev-atlas -- security threats verify --format json
      - name: Threat model governance tests
        run: |
          cargo test --locked -p bijux-dev-atlas threat_model_governance_contracts -- --nocapture
