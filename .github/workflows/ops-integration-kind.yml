name: ops-integration-kind
# Tooling orchestration is centralized via bijux dev atlas command surfaces.

on:
  workflow_dispatch:
    inputs:
      allow_network:
        description: "Allow networked integration calls"
        required: true
        default: "true"
      run_conformance:
        description: "Run k8s conformance checks"
        required: true
        default: "true"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ops-integration-kind-${{ github.ref }}
  cancel-in-progress: true

env:
  RUN_ID: ops-kind-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  kind-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NETWORK_ACCESS: required
      KUBECONFIG: ~/.kube/config
      ISO_ROOT: artifacts/isolates/ops-kind
      CARGO_TARGET_DIR: .cache/cargo/target/ops-kind
      CARGO_HOME: .cache/cargo/home/ops-kind
      TMPDIR: artifacts/isolates/ops-kind/tmp
      TMP: artifacts/isolates/ops-kind/tmp
      TEMP: artifacts/isolates/ops-kind/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.85.0
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: normal
      - name: Prepare run artifact directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "artifacts/${RUN_ID}"
          mkdir -p "artifacts/${RUN_ID}"
      - name: Restore cargo cache
        id: cache-target
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: .cache/cargo/target/ops-kind
          key: cargo-target-nightly-ops-kind-${{ runner.os }}-1.85.0-${{ hashFiles('Cargo.lock') }}
      - name: Run cluster integration lane
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ops-kind"
          mkdir -p "${report_root}" "${logs_root}"
          make FORMAT=json doctor > "${logs_root}/doctor.stdout.log" 2> "${logs_root}/doctor.stderr.log"
          cp "artifacts/doctor/${RUN_ID}/report.json" "${report_root}/doctor.json"
          cp "artifacts/doctor/${RUN_ID}/touched-paths-report.json" "${report_root}/doctor-touched-paths.json"
          cargo run --locked -q -p bijux-dev-atlas -- check tree-budgets --format json > "${report_root}/tree-budgets.json" 2> "${logs_root}/tree-budgets.stderr.log"
          make FORMAT=json stack-up > "${logs_root}/ops-kind-up.stdout.log" 2> "${logs_root}/ops-kind-up.stderr.log"
          cp "artifacts/stack-up/${RUN_ID}/report.txt" "${report_root}/ops-kind-up.txt"
          cargo run --locked -q -p bijux-dev-atlas -- ops k8s smoke --profile kind --allow-subprocess --format json > "${report_root}/ops-k8s-smoke.json" 2> "${logs_root}/ops-k8s-smoke.stderr.log"
          if [ "${{ github.event.inputs.run_conformance || 'true' }}" = "true" ]; then
            make FORMAT=json k8s-validate > "${logs_root}/ops-k8s.stdout.log" 2> "${logs_root}/ops-k8s.stderr.log"
            cp "artifacts/k8s-validate/${RUN_ID}/report.json" "${report_root}/ops-k8s.json"
          fi
          make FORMAT=json stack-down > "${logs_root}/ops-kind-down.stdout.log" 2> "${logs_root}/ops-kind-down.stderr.log"
          cp "artifacts/stack-down/${RUN_ID}/report.txt" "${report_root}/ops-kind-down.txt"
          printf "- lane: ops-kind\n- report root: %s\n- cache target hit: %s\n" \
            "${report_root}" "${{ steps.cache-target.outputs.cache-hit || 'false' }}" > "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Save cargo cache
        if: success()
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: .cache/cargo/target/ops-kind
          key: cargo-target-nightly-ops-kind-${{ runner.os }}-1.85.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ops-kind-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 14
