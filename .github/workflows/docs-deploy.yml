name: docs-deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "configs/docs/**"
      - "crates/bijux-dev-atlas/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.84.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: configs/docs/requirements.lock.txt

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Validate docs output directory contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
import pathlib
import yaml
mkdocs = yaml.safe_load(pathlib.Path("mkdocs.yml").read_text())
site_dir = mkdocs.get("site_dir", "site")
exclude_docs = mkdocs.get("exclude_docs", "")
if site_dir != "artifacts/docs/site":
    raise SystemExit(f"mkdocs site_dir must be artifacts/docs/site, got: {site_dir}")
if "_drafts/**" not in exclude_docs:
    raise SystemExit("mkdocs exclude_docs must include _drafts/**")
PY

      - name: Install docs toolchain
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install -r configs/docs/requirements.lock.txt
          npm ci --prefix configs/docs

      - name: Build docs site
        shell: bash
        run: |
          set -euo pipefail
          mkdocs build --strict
          test -f artifacts/docs/site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: artifacts/docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
