name: security-supply-chain-validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-supply-chain:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/security-supply-chain
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/security-supply-chain
      TMPDIR: artifacts/isolates/security-supply-chain/tmp
      TMP: artifacts/isolates/security-supply-chain/tmp
      TEMP: artifacts/isolates/security-supply-chain/tmp
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup-rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0

      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"

      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}" artifacts/governance

      - name: generate governance evidence required by security policy
        run: |
          cargo run --locked -q -p bijux-dev-atlas -- governance exceptions validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance deprecations validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance breaking validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance doctor --repo-root "${GITHUB_WORKSPACE}" --format json || true

      - name: verify governance evidence files exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "artifacts/governance/exceptions-summary.json"
            "artifacts/governance/exceptions-expiry-warning.json"
            "artifacts/governance/exceptions-churn.json"
            "artifacts/governance/deprecations-summary.json"
            "artifacts/governance/compat-warnings.json"
            "artifacts/governance/breaking-changes.json"
            "artifacts/governance/governance-doctor.json"
            "artifacts/governance/institutional-delta.md"
            "artifacts/governance/institutional-delta-inputs.json"
          )
          for file in "${required[@]}"; do
            test -f "${file}" || { echo "missing governance evidence file: ${file}" >&2; exit 1; }
          done

      - name: run dependency security validation
        run: cargo run --locked -q -p bijux-dev-atlas -- security validate --format json

      - name: run dependency audit command
        run: cargo run --locked -q -p bijux-dev-atlas -- security dependency-audit --format json

      - name: run supply chain contracts
        run: cargo test --locked -p bijux-dev-atlas security_dependency_audit_command_emits_report -- --nocapture
