name: security-supply-chain-validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: setup-rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: run dependency security validation
        run: cargo run -q -p bijux-dev-atlas -- security validate --format json

      - name: run dependency audit command
        run: cargo run -q -p bijux-dev-atlas -- security dependency-audit --format json

      - name: run supply chain contracts
        run: cargo test -p bijux-dev-atlas --test security_supply_chain_contracts -- --nocapture
