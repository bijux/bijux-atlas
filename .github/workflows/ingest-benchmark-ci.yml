name: ingest-benchmark-ci

on:
  pull_request:
    paths:
      - "crates/bijux-atlas-ingest/**"
      - ".github/workflows/ingest-benchmark-ci.yml"
  workflow_dispatch:

jobs:
  ingest-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Build ingest benchmark executables
        run: cargo bench -p bijux-atlas-ingest --features bench-ingest-throughput --no-run --locked
      - name: Run ingest benchmark regression fixture tests
        run: cargo test -p bijux-atlas-ingest ingest_benchmark_regression --locked -- --nocapture
