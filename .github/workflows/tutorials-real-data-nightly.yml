name: tutorials-real-data-nightly

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dataset-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.84.1
      - name: Run real-data dataset E2E smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/tutorials/nightly
          cargo run --locked -q -p bijux-dev-atlas -- \
            tutorials run dataset-e2e \
            --dataset-id genes-baseline \
            --profile local \
            --format json \
            > artifacts/tutorials/nightly/dataset-e2e-smoke.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: tutorials-real-data-nightly-${{ github.run_id }}
          path: artifacts/tutorials/nightly
          retention-days: 7
