name: tutorials-real-data-nightly

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dataset-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Run real-data dataset E2E smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/tutorials/nightly
          cargo run --locked -q -p bijux-dev-atlas -- \
            tutorials run dataset-e2e \
            --dataset-id genes-baseline \
            --profile local \
            --format json \
            > artifacts/tutorials/nightly/dataset-e2e-smoke.json
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: tutorials-real-data-nightly-${{ github.run_id }}
          path: artifacts/tutorials/nightly
          retention-days: 7
