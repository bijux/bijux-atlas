name: ops-validate

on:
  pull_request:
    paths:
      - 'ops/**'
      - 'crates/bijux-dev-atlas/**'
      - 'makes/ops.mk'
      - '.github/workflows/ops-validate.yml'

permissions:
  contents: read

concurrency:
  group: ops-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUN_ID: ops-validate-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/ops-validate
      CARGO_TARGET_DIR: ${{ github.workspace }}/artifacts/isolates/ops-validate/cargo-target
      CARGO_HOME: ${{ github.workspace }}/artifacts/isolates/ops-validate/cargo-home
      TMPDIR: artifacts/isolates/ops-validate/tmp
      TMP: artifacts/isolates/ops-validate/tmp
      TEMP: artifacts/isolates/ops-validate/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Prepare run artifact directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "artifacts/${RUN_ID}"
          mkdir -p "artifacts/${RUN_ID}"
      - name: Restore cargo cache
        id: cache-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: artifacts/isolates/ops-validate/cargo-target
          key: cargo-target-pr-ops-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Run ops validate lane
        shell: bash
        run: |
          set -euo pipefail
          capture_report() {
            local source_path="$1"
            local destination_path="$2"
            if [[ -f "${source_path}" ]]; then
              cp "${source_path}" "${destination_path}"
            fi
          }
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ops-validate"
          mkdir -p "${report_root}" "${logs_root}"
          make FORMAT=json doctor > "${logs_root}/doctor.stdout.log" 2> "${logs_root}/doctor.stderr.log"
          capture_report "artifacts/doctor/${RUN_ID}/report.json" "${report_root}/doctor.json"
          capture_report "artifacts/doctor/${RUN_ID}/touched-paths-report.json" "${report_root}/doctor-touched-paths.json"
          make help > "${logs_root}/make-help.stdout.log" 2> "${logs_root}/make-help.stderr.log"
          make makes-target-list > "${logs_root}/makes-target-list.stdout.log" 2> "${logs_root}/makes-target-list.stderr.log"
          capture_report "makes/target-list.json" "${report_root}/makes-target-list.json"
          make FORMAT=json ops-validate > "${logs_root}/ops-validate.stdout.log" 2> "${logs_root}/ops-validate.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- ops validate --profile kind --format json > "${report_root}/ops-validate.json" 2> "${logs_root}/ops-validate-report.stderr.log"
          printf -- "- lane: ops-validate\n- report: %s\n- cache target hit: %s\n" \
            "${report_root}/ops-validate.json" "${{ steps.cache-target.outputs.cache-hit || 'false' }}" > "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Run ops doctor required gate
        shell: bash
        run: |
          set -euo pipefail
          capture_report() {
            local source_path="$1"
            local destination_path="$2"
            if [[ -f "${source_path}" ]]; then
              cp "${source_path}" "${destination_path}"
            fi
          }
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ops-validate"
          mkdir -p "${report_root}" "${logs_root}"
          make FORMAT=json doctor > "${logs_root}/ops-doctor.stdout.log" 2> "${logs_root}/ops-doctor.stderr.log"
          capture_report "artifacts/doctor/${RUN_ID}/report.json" "${report_root}/ops-doctor.json"
      - name: Run ops smoke command gates
        shell: bash
        run: |
          set -euo pipefail
          capture_report() {
            local source_path="$1"
            local destination_path="$2"
            if [[ -f "${source_path}" ]]; then
              cp "${source_path}" "${destination_path}"
            fi
          }
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ops-validate"
          mkdir -p "${report_root}" "${logs_root}"
          make FORMAT=json k8s-render > "${logs_root}/ops-k8s-render.stdout.log" 2> "${logs_root}/ops-k8s-render.stderr.log"
          capture_report "artifacts/k8s-render/${RUN_ID}/report.json" "${report_root}/ops-k8s-render.json"
          cargo run --locked -q -p bijux-dev-atlas -- ops schema validate --format json > "${report_root}/ops-schema-validate.json" 2> "${logs_root}/ops-schema-validate.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- ops inventory validate --format json > "${report_root}/ops-inventory-validate.json" 2> "${logs_root}/ops-inventory-validate.stderr.log"
      - name: Save cargo cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: artifacts/isolates/ops-validate/cargo-target
          key: cargo-target-pr-ops-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ops-validate-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5
