name: Query Benchmark CI

on:
  pull_request:
    paths:
      - "crates/bijux-atlas-query/**"
      - ".github/workflows/query-benchmark-ci.yml"
  push:
    branches: [main]
    paths:
      - "crates/bijux-atlas-query/**"
      - ".github/workflows/query-benchmark-ci.yml"

jobs:
  query-benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Run query benchmark regression fixture tests
        run: cargo test -p bijux-atlas-query query_benchmark_regression --locked -- --nocapture
