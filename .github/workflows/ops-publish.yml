name: ops-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ops-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ops-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CHART_PATH: ops/k8s/charts/bijux-atlas
      ARTIFACT_ROOT: artifacts/ops-publish
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Derive release version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Package ops chart through dev-atlas
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACT_ROOT}/charts"
          cargo run --locked -q -p bijux-dev-atlas -- release ops package \
            --allow-write \
            --allow-subprocess \
            --format json \
            --out "${ARTIFACT_ROOT}/ops-package-report.json"
          cp -f artifacts/release/ops/package/*.tgz "${ARTIFACT_ROOT}/charts/"

      - name: Push ops chart through dev-atlas
        shell: bash
        run: |
          set -euo pipefail
          export CRATES_IO_TOKEN="${{ secrets.CARGO_REGISTRY_TOKEN }}"
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          printf '%s\n' "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          cargo run --locked -q -p bijux-dev-atlas -- release ops push \
            --allow-write \
            --allow-subprocess \
            --allow-network \
            --format json \
            --out "${ARTIFACT_ROOT}/ops-push-report.json"

      - name: Build profiles bundle and manifests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ARTIFACT_ROOT}/bundle"
          cp -v ops/k8s/install-matrix.json "${ARTIFACT_ROOT}/bundle/"
          cp -v ops/k8s/charts/bijux-atlas/values.schema.json "${ARTIFACT_ROOT}/bundle/"
          jq -n '{
            schema_version:1,
            kubernetes:{minimum_version:"1.28"},
            helm:{minimum_version:"3.14.0"},
            storage:{require_default_storage_class:true},
            network:{require_cluster_dns:true},
            security:{require_rbac:true,require_network_policy_support:true}
          }' > "${ARTIFACT_ROOT}/bundle/cluster-prerequisites.json"
          mkdir -p "${ARTIFACT_ROOT}/bundle/values"
          cp -v ops/k8s/values/*.yaml "${ARTIFACT_ROOT}/bundle/values/"
          tar -czf "${ARTIFACT_ROOT}/profiles-bundle-${RELEASE_VERSION}.tar.gz" -C "${ARTIFACT_ROOT}/bundle" .
          jq -n \
            --arg version "${RELEASE_VERSION}" \
            --arg chart "$(basename "$(ls -1 ${ARTIFACT_ROOT}/charts/*.tgz | head -n1)")" \
            --arg bundle "profiles-bundle-${RELEASE_VERSION}.tar.gz" \
            --arg install_matrix "install-matrix.json" \
            '{schema_version:1,version:$version,chart_package:$chart,profiles_bundle:$bundle,install_matrix:$install_matrix}' \
            > "${ARTIFACT_ROOT}/ops-bundle-manifest.json"
          sha256sum "${ARTIFACT_ROOT}/profiles-bundle-${RELEASE_VERSION}.tar.gz" \
            | awk '{print $1}' \
            | jq -R -s '{schema_version:1,bundle_sha256:(split("\n")[0])}' \
            > "${ARTIFACT_ROOT}/ops-bundle-checksums.json"
          jq -n \
            --argjson matrix "$(cat ops/k8s/install-matrix.json)" \
            '{schema_version:1,profile_count:($matrix.profiles|length),profiles:($matrix.profiles|map({name:.name,namespace:.namespace}))}' \
            > "${ARTIFACT_ROOT}/install-matrix-report.json"

      - name: Upload ops publish artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ops-publish-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ops-publish
          retention-days: 14

      - name: Upload ops bundle assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --notes "Automated ops release artifacts"
          fi
          attempts=5
          delay=15
          for i in $(seq 1 "${attempts}"); do
            if gh release upload "${tag}" \
              "${ARTIFACT_ROOT}/ops-bundle-manifest.json" \
              "${ARTIFACT_ROOT}/ops-bundle-checksums.json" \
              "${ARTIFACT_ROOT}/install-matrix-report.json" \
              "${ARTIFACT_ROOT}/profiles-bundle-${RELEASE_VERSION}.tar.gz" \
              "${ARTIFACT_ROOT}/charts/"*.tgz \
              --clobber; then
              exit 0
            fi
            if [[ "${i}" -lt "${attempts}" ]]; then
              echo "gh release upload failed (attempt ${i}/${attempts}); retrying in ${delay}s"
              sleep "${delay}"
            fi
          done
          echo "gh release upload failed after ${attempts} attempts" >&2
          exit 1
