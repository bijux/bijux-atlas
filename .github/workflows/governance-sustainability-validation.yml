name: Governance Sustainability Validation

on:
  pull_request:
    paths:
      - "docs/06-development/**"
      - "configs/sources/governance/governance/**"
      - "ops/governance/**"
      - "crates/bijux-dev-atlas/src/commands/governance.rs"
      - "crates/bijux-dev-atlas/tests/*governance*"
  workflow_dispatch: {}

jobs:
  governance-sustainability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Governance checks
        run: |
          cargo run --locked -q -p bijux-dev-atlas -- governance check --format json
          cargo run --locked -q -p bijux-dev-atlas -- governance validate --format json
          cargo run --locked -q -p bijux-dev-atlas -- governance report --format json
      - name: Governance sustainability contracts
        run: cargo test --locked -p bijux-dev-atlas --test governance_sustainability_contracts -- --nocapture
