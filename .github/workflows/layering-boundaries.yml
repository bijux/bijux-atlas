name: layering-boundaries

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  layering-boundaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Verify layering boundaries
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked -p bijux-dev-atlas --test layering_enforcement -- --nocapture
