name: security-data-protection-validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-data-protection:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: setup-rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: run data protection contracts
        run: cargo test --locked -p bijux-atlas --test core security_data_protection_contracts -- --nocapture

      - name: run governance contract
        run: cargo test --locked -p bijux-dev-atlas --test data_protection_governance_contracts -- --nocapture

      - name: generate governance evidence required by security policy
        run: |
          cargo run --locked -q -p bijux-dev-atlas -- governance exceptions validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance deprecations validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance breaking validate --repo-root "${GITHUB_WORKSPACE}" --format json || true
          cargo run --locked -q -p bijux-dev-atlas -- governance doctor --repo-root "${GITHUB_WORKSPACE}" --format json || true
      - name: verify governance evidence files exist
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "artifacts/governance/exceptions-summary.json"
            "artifacts/governance/exceptions-expiry-warning.json"
            "artifacts/governance/exceptions-churn.json"
            "artifacts/governance/deprecations-summary.json"
            "artifacts/governance/compat-warnings.json"
            "artifacts/governance/breaking-changes.json"
            "artifacts/governance/governance-doctor.json"
            "artifacts/governance/institutional-delta.md"
            "artifacts/governance/institutional-delta-inputs.json"
          )
          for file in "${required[@]}"; do
            test -f "${file}" || { echo "missing governance evidence file: ${file}" >&2; exit 1; }
          done

      - name: validate security controls
        run: cargo run --locked -q -p bijux-dev-atlas -- security validate --format json
