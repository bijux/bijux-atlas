name: ci-pr

on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUN_ID: pr-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  route-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            docs_only:
              - 'docs/**'
              - 'mkdocs.yml'
              - '.github/**'
              - 'configs/sources/repository/docs/**'
              - 'configs/sources/runtime/openapi/**'
              - 'makes/docs.mk'

  minimal-root-policies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: route-changes
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/ci-pr-minimal
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/ci-pr-minimal
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/ci-pr-minimal
      NEXTEST_CACHE_DIR: .cache/cargo/nextest/ci-pr-minimal
      TMPDIR: artifacts/isolates/ci-pr-minimal/tmp
      TMP: artifacts/isolates/ci-pr-minimal/tmp
      TEMP: artifacts/isolates/ci-pr-minimal/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - name: Prepare run artifact directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "artifacts/${RUN_ID}"
          mkdir -p "artifacts/${RUN_ID}"
      - name: Restore cargo registry cache
        id: cache-registry
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-pr-minimal/registry
            .cache/cargo/home/ci-pr-minimal/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Restore cargo target cache
        id: cache-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-pr-minimal
          key: cargo-target-pr-minimal-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Run minimal lane
        shell: bash
        env:
          CACHE_REGISTRY_HIT: ${{ steps.cache-registry.outputs.cache-hit || 'false' }}
          CACHE_TARGET_HIT: ${{ steps.cache-target.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ci-pr-minimal"
          mkdir -p "${report_root}" "${logs_root}"
          contracts_root="${report_root}/contracts"
          mkdir -p "${contracts_root}"
          cargo run --locked -q -p bijux-dev-atlas -- contracts self-check --format json > "${contracts_root}/self-check.json" 2> "${logs_root}/contracts-self-check.stderr.log"
          make FORMAT=json doctor > "${logs_root}/doctor.stdout.log" 2> "${logs_root}/doctor.stderr.log"
          cp "artifacts/doctor/${RUN_ID}/report.json" "${report_root}/doctor.json"
          cp "artifacts/doctor/${RUN_ID}/touched-paths-report.json" "${report_root}/doctor-touched-paths.json"
          make help > "${logs_root}/make-help.stdout.log" 2> "${logs_root}/make-help.stderr.log"
          make makes-target-list > "${logs_root}/makes-target-list.stdout.log" 2> "${logs_root}/makes-target-list.stderr.log"
          cp makes/target-list.json "${report_root}/makes-target-list.json"
          if [ "${GITHUB_EVENT_NAME}" = "merge_group" ]; then
            ARTIFACT_ROOT="${report_root}" RUN_ID="${RUN_ID}" make FORMAT=json contracts-merge > "${contracts_root}/all.json" 2> "${logs_root}/contracts-merge.stderr.log"
          else
            ARTIFACT_ROOT="${report_root}" RUN_ID="${RUN_ID}" make FORMAT=json contracts-pr > "${contracts_root}/all.json" 2> "${logs_root}/contracts-pr.stderr.log"
          fi
          cargo run --locked -q -p bijux-dev-atlas -- check run --domain root --tag lint --format json > "${logs_root}/lint-policy-report.stdout.log" 2> "${logs_root}/lint-policy-report.stderr.log"
          printf 'workspace_lints_file=Cargo.toml\nclippy_conf_dir=configs/sources/repository/rust-tooling\n' > "${report_root}/effective-clippy-policy.txt"
          cargo run --locked -q -p bijux-dev-atlas -- check run --domain root --tag lint --format json > "${logs_root}/lint-policy-enforce.stdout.log" 2> "${logs_root}/lint-policy-enforce.stderr.log"
          CLIPPY_CONF_DIR=configs/sources/repository/rust-tooling cargo clippy --locked --workspace --all-targets --all-features --message-format=json -- -D warnings > "${report_root}/clippy.json" 2> "${logs_root}/lint-clippy-json.stderr.log"
          cargo tree --locked -p bijux-atlas --edges normal --no-default-features --features backend-local > "${report_root}/store-deps-backend-local.txt"
          cargo tree --locked -p bijux-atlas --edges normal --no-default-features --features backend-s3 > "${report_root}/store-deps-backend-s3.txt"
          local_dep_count="$(wc -l < "${report_root}/store-deps-backend-local.txt")"
          s3_dep_count="$(wc -l < "${report_root}/store-deps-backend-s3.txt")"
          [ "${s3_dep_count}" -gt "${local_dep_count}" ]
          printf '{"schema_version":1,"kind":"store_backend_dependency_surface","backend_local_count":%s,"backend_s3_count":%s}\n' "${local_dep_count}" "${s3_dep_count}" > "${report_root}/store-deps-diff.json"
          cp ops/inventory/release-build-profile.json "${report_root}/store-release-backend-profile.json"
          cargo check --locked -q -p bijux-atlas --no-default-features --features backend-local > "${logs_root}/store-backend-local-check.stdout.log" 2> "${logs_root}/store-backend-local-check.stderr.log"
          cargo check --locked -q -p bijux-atlas --no-default-features --features backend-s3 > "${logs_root}/store-backend-s3-check.stdout.log" 2> "${logs_root}/store-backend-s3-check.stderr.log"
          cargo test --locked -q -p bijux-atlas --test store --no-default-features --features backend-local local_backend_roundtrip_is_hermetic -- --exact > "${logs_root}/store-backend-local-test.stdout.log" 2> "${logs_root}/store-backend-local-test.stderr.log"
          cargo test --locked -q -p bijux-atlas --test store --no-default-features --features backend-s3 http_backend_reads_from_hermetic_cached_objects -- --exact > "${logs_root}/store-backend-s3-test.stdout.log" 2> "${logs_root}/store-backend-s3-test.stderr.log"
          cargo fmt --locked --all -- --check --config-path configs/sources/repository/rust-tooling/rustfmt.toml > "${logs_root}/fmt-check.stdout.log" 2> "${logs_root}/fmt-check.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- configs verify --format json > "${report_root}/configs-verify.json" 2> "${logs_root}/configs-verify.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check run --suite docs:required --include-internal --include-slow --format json > "${contracts_root}/docs-required.json" 2> "${logs_root}/docs-required.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check run --suite configs:required --include-internal --include-slow --format json > "${contracts_root}/configs-required.json" 2> "${logs_root}/configs-required.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check run --suite make:required --include-internal --include-slow --format json > "${contracts_root}/make-required.json" 2> "${logs_root}/make-required.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check run --suite repo_required --include-internal --include-slow --allow-git --format json > "${contracts_root}/repo-required.json" 2> "${logs_root}/repo-required.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check list --suite docs:required --include-internal --include-slow --format json > "${report_root}/suite-membership-docs_required.json"
          cargo run --locked -q -p bijux-dev-atlas -- check list --suite configs:required --include-internal --include-slow --format json > "${report_root}/suite-membership-configs_required.json"
          cargo run --locked -q -p bijux-dev-atlas -- check list --suite make:required --include-internal --include-slow --format json > "${report_root}/suite-membership-make_required.json"
          cargo run --locked -q -p bijux-dev-atlas -- check list --suite repo_required --include-internal --include-slow --format json > "${report_root}/suite-membership-repo_required.json"
          jq -n \
            --arg run_id "${RUN_ID}" \
            --arg source "configs/sources/repository/repo-laws.json" \
            --arg suite "repo_required" \
            --slurpfile suite_members "${report_root}/suite-membership-repo_required.json" \
            --slurpfile run_report "${contracts_root}/repo-required.json" \
            '{schema_version:1,kind:"repo_integrity_summary",run_id:$run_id,laws_source:$source,required_suite:$suite,checks_total:($suite_members[0].checks|length),counts:$run_report[0].counts,p0_checks:$suite_members[0].checks|map(.id)}' \
            > "${report_root}/repo-integrity-summary.json"
          base_ref="${GITHUB_BASE_REF:-main}"
          base_sha="$(git merge-base HEAD "origin/${base_ref}" || true)"
          if [ -z "${base_sha}" ]; then
            base_sha="$(git rev-parse HEAD~1)"
          fi
          git diff --name-status "${base_sha}...HEAD" > "${report_root}/repo-surface-diff.txt"
          export REPORT_ROOT="${report_root}"
          export BASE_SHA="${base_sha}"
          python - <<'PY'
          import json, pathlib, os
          root = pathlib.Path(os.environ["REPORT_ROOT"])
          lines = [ln.strip() for ln in (root / "repo-surface-diff.txt").read_text().splitlines() if ln.strip()]
          rows = []
          root_rows = []
          for line in lines:
            parts = line.split("\t")
            status = parts[0]
            paths = [p for p in parts[1:] if p]
            rows.append({"status": status, "paths": paths})
            for p in paths:
              if "/" not in p:
                root_rows.append({"status": status, "path": p})
          (root / "repo-surface-diff.json").write_text(json.dumps({
              "schema_version": 1,
              "kind": "repo_surface_diff",
              "base": os.environ.get("BASE_SHA", ""),
              "head": os.environ.get("GITHUB_SHA", ""),
              "changes": rows,
          }, indent=2) + "\n")
          (root / "root-change-report.json").write_text(json.dumps({
              "schema_version": 1,
              "kind": "root_change_report",
              "base": os.environ.get("BASE_SHA", ""),
              "head": os.environ.get("GITHUB_SHA", ""),
              "root_changes": root_rows,
          }, indent=2) + "\n")
          PY
          root_changed_count="$(jq -r '.root_changes | length' "${report_root}/root-change-report.json")"
          if [ "${root_changed_count}" -gt 0 ]; then
            cargo run --locked -q -p bijux-dev-atlas -- contracts root --mode static --format json --artifacts-root "${contracts_root}" > "${contracts_root}/root-strict.json" 2> "${logs_root}/root-strict.stderr.log"
          fi
          semantic_target_count="$(jq -r '[.root_changes[] | select(.path == \"README.md\" or .path == \"CONTRACT.md\")] | length' "${report_root}/root-change-report.json")"
          if [ "${semantic_target_count}" -gt 0 ] && [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            pr_body="$(jq -r '.pull_request.body // \"\"' \"${GITHUB_EVENT_PATH}\")"
            has_label="$(jq -r '[.pull_request.labels[]?.name | select(. == \"root-semantic-diff-approved\")] | length' \"${GITHUB_EVENT_PATH}\")"
            if ! printf '%s' "${pr_body}" | grep -q '\\[root-semantic-diff\\]' && [ "${has_label}" -eq 0 ]; then
              echo \"missing required root semantic diff marker: add [root-semantic-diff] to PR description or label root-semantic-diff-approved\" >&2
              exit 1
            fi
          fi
          cargo run --locked -q -p bijux-dev-atlas -- governance validate --format json > "${report_root}/governance-validate.json" 2> "${logs_root}/governance-validate.stderr.log"
          coverage_current="$(jq -r '.coverage_percent' artifacts/governance/governance-coverage.json)"
          coverage_baseline="$(jq -r '.coverage_percent_min' ops/governance/repository/coverage-baseline.json)"
          delta="$(awk -v c="${coverage_current}" -v b="${coverage_baseline}" 'BEGIN { printf \"%.2f\", c-b }')"
          status="ok"
          if awk -v c="${coverage_current}" -v b="${coverage_baseline}" 'BEGIN { exit !(c < b) }'; then
            status="failed"
            echo "governance coverage dropped below baseline: current=${coverage_current} baseline=${coverage_baseline}" >&2
            exit 1
          fi
          jq -n \
            --arg status "${status}" \
            --argjson current "${coverage_current}" \
            --argjson baseline "${coverage_baseline}" \
            --arg delta "${delta}" \
            '{
              schema_version: 1,
              kind: "governance_coverage_diff",
              status: $status,
              baseline_percent: $baseline,
              current_percent: $current,
              delta_percent: ($delta | tonumber)
            }' > "${report_root}/governance-coverage-diff.json"
          changed_list="$(git diff --name-only "${base_sha}...HEAD")"
          changed_file() {
            printf '%s\n' "${changed_list}" | grep -qx "$1"
          }
          python - <<'PY'
          import json, os, pathlib, subprocess
          base = os.environ.get("BASE_SHA", "").strip()
          head = os.environ.get("GITHUB_SHA", "").strip()
          report_root = pathlib.Path(os.environ["REPORT_ROOT"])
          changed = []
          if base:
              out = subprocess.check_output(["git", "diff", "--name-only", f"{base}...HEAD"], text=True)
              changed = [line.strip() for line in out.splitlines() if line.strip()]
          def subset(prefixes):
              return sorted([p for p in changed if any(p.startswith(px) for px in prefixes)])
          reports = {
              "schema_version": 1,
              "kind": "semantic_drift_reports",
              "base": base,
              "head": head,
              "configs": {"changed": subset(["configs/", "configs/schemas/contracts/env.schema.json"])},
              "docs": {"changed": subset(["docs/"])},
              "make": {"changed": subset(["makes/", "configs/sources/operations/ops/makes-targets.json", "makes/target-list.json"])},
              "docker": {"changed": subset(["ops/docker/", "ops/docker/images.manifest.json", "ops/docker/policy.json"])},
              "ops_readiness": {"changed": subset(["ops/observe/readiness.json", "ops/report/evidence-levels.json", "ops/report/generated/readiness-score.json", "ops/report/generated/release-evidence-bundle.json"])},
          }
          for domain in ["configs", "docs", "make", "docker", "ops_readiness"]:
              reports[domain]["status"] = "changed" if reports[domain]["changed"] else "unchanged"
              reports[domain]["count"] = len(reports[domain]["changed"])
              path = report_root / f"semantic-drift-{domain}.json"
              path.write_text(json.dumps({
                  "schema_version": 1,
                  "kind": f"semantic_drift_{domain}",
                  "base": base,
                  "head": head,
                  "status": reports[domain]["status"],
                  "changed": reports[domain]["changed"],
                  "count": reports[domain]["count"],
              }, indent=2) + "\n")
          (report_root / "semantic-drift-summary.json").write_text(json.dumps(reports, indent=2) + "\n")
          PY
          pr_body="$(jq -r '.pull_request.body // \"\"' "${GITHUB_EVENT_PATH}")"
          if changed_file "configs/generated/openapi/v1/openapi.snapshot.json"; then
            if ! printf '%s' "${pr_body}" | grep -Eq '\[api-compat:(non-breaking|breaking)\]'; then
              echo "OpenAPI snapshot changed but compatibility marker is missing; add [api-compat:non-breaking] or [api-compat:breaking] in PR body" >&2
              exit 1
            fi
          fi
          endpoints_changed=0
          openapi_changed=0
          if changed_file "ops/observe/contracts/endpoint-observability-contract.json"; then endpoints_changed=1; fi
          if changed_file "configs/generated/openapi/v1/openapi.snapshot.json"; then openapi_changed=1; fi
          if [ "${endpoints_changed}" -ne "${openapi_changed}" ]; then
            echo "endpoint observability contract diff must match OpenAPI snapshot diff" >&2
            exit 1
          fi
          error_registry_changed=0
          error_runtime_changed=0
          if changed_file "crates/bijux-atlas/src/contracts/errors/error_codes.rs"; then error_registry_changed=1; fi
          if changed_file "crates/bijux-atlas/src/api/generated/error_codes.rs" || changed_file "crates/bijux-atlas/src/generated/error_codes.rs" || changed_file "ops/inventory/meta/error-registry.json"; then error_runtime_changed=1; fi
          if [ "${error_registry_changed}" -ne "${error_runtime_changed}" ]; then
            echo "ERROR_CODES registry diff must match runtime error map diff" >&2
            exit 1
          fi
          config_registry_changed=0
          if changed_file "configs/schemas/contracts/env.schema.json"; then config_registry_changed=1; fi
          # Generated reference drift mapping from SSOT surfaces.
          ssot_docs_pairs=0
          if changed_file "ops/inventory/root-surface.json"; then
            ssot_docs_pairs=1
            changed_file "docs/05-architecture/source-layout-and-ownership.md" || { echo "root surface SSOT changed but docs/05-architecture/source-layout-and-ownership.md was not updated" >&2; exit 1; }
          fi
          if changed_file "configs/sources/operations/ops/makes-targets.json"; then
            ssot_docs_pairs=1
            changed_file "makes/target-list.json" || { echo "public target registry changed but makes/target-list.json was not updated" >&2; exit 1; }
          fi
          if [ "${ssot_docs_pairs}" -eq 1 ]; then
            jq -n '{schema_version:1,kind:"docs_ssot_reference_drift_gate",status:"ok"}' > "${report_root}/docs-ssot-reference-drift.json"
          else
            jq -n '{schema_version:1,kind:"docs_ssot_reference_drift_gate",status:"not_applicable"}' > "${report_root}/docs-ssot-reference-drift.json"
          fi
          # Golden workflow docs must include executable commands and outcome guidance.
          grep -nE "^cargo run -p bijux-atlas --bin bijux-atlas -- --help$" docs/02-getting-started/run-atlas-locally.md > /dev/null
          grep -nE "^make ci-fast$" docs/06-development/automation-control-plane.md > /dev/null
          grep -nE "^## Local Success Criteria$" docs/02-getting-started/run-atlas-locally.md > /dev/null
          grep -nE "^## Triage Workflow$" docs/06-development/automation-control-plane.md > /dev/null
          jq -n '{schema_version:1,kind:"docs_golden_workflow_verification",status:"ok"}' > "${report_root}/docs-golden-workflow-verification.json"
          # Docs external link allowlist requires expiry and owner for each entry.
          python - <<'PY'
          import json, pathlib
          allow = json.loads(pathlib.Path("configs/sources/repository/docs/external-link-allowlist.json").read_text())
          entries = allow.get("entries", [])
          errors = []
          for i, row in enumerate(entries):
              if not row.get("pattern"):
                  errors.append(f"entries[{i}] missing pattern")
              if not row.get("owner"):
                  errors.append(f"entries[{i}] missing owner")
              if not row.get("expires_on"):
                  errors.append(f"entries[{i}] missing expires_on")
          if errors:
              raise SystemExit("docs external-link allowlist contract failed: " + "; ".join(errors))
          pathlib.Path(__import__("os").environ["REPORT_ROOT"], "docs-link-allowlist-policy.json").write_text(json.dumps({
              "schema_version": 1,
              "kind": "docs_link_allowlist_policy",
              "status": "ok",
              "entries": len(entries)
          }, indent=2) + "\n")
          PY
          # Alert/runbook and SLO/load/e2e mapping contracts.
          python - <<'PY'
          import json, pathlib, re
          root = pathlib.Path(".")
          report_root = pathlib.Path(__import__("os").environ["REPORT_ROOT"])
          alerts = json.loads((root / "ops/observe/contracts/alerts-contract.json").read_text())["alert_specs"]
          alert_catalog = {r["id"] for r in json.loads((root / "ops/observe/alert-catalog.json").read_text())["alerts"]}
          missing_alerts = sorted([k for k in alerts.keys() if k not in alert_catalog])
          missing_runbook_ids = sorted([k for k, v in alerts.items() if not str(v.get("runbook_id", "")).strip()])
          incident_doc = root / "docs/04-operations/incident-response.md"
          if not incident_doc.exists():
              raise SystemExit("alerts/runbooks mapping failed: docs/04-operations/incident-response.md missing")
          if missing_alerts or missing_runbook_ids:
              raise SystemExit(f"alerts/runbooks mapping failed missing_alerts={missing_alerts} missing_runbook_ids={missing_runbook_ids}")
          slo = json.loads((root / "configs/sources/operations/slo/slo.json").read_text())
          slis = {r["id"] for r in slo["slis"]}
          slos = slo["slos"]
          bad_slos = [row["id"] for row in slos if row.get("sli") not in slis]
          if bad_slos:
              raise SystemExit("slo mapping failed: unknown sli in " + ", ".join(sorted(bad_slos)))
          dashboards = list((root / "ops/observe/dashboards").glob("*.json"))
          if not dashboards:
              raise SystemExit("slo mapping failed: no dashboards found under ops/observe/dashboards")
          load_suites = json.loads((root / "ops/load/generated/suites.manifest.json").read_text())["suites"]
          capacity_doc = root / "docs/04-operations/performance-and-load.md"
          if not capacity_doc.exists():
              raise SystemExit("load suite mapping failed: docs/04-operations/performance-and-load.md missing")
          no_purpose = [row["name"] for row in load_suites if not row.get("purpose")]
          if no_purpose:
              raise SystemExit("load suites missing purpose: " + ", ".join(sorted(no_purpose)))
          e2e_scenarios = json.loads((root / "ops/e2e/scenarios/scenarios.json").read_text())["scenarios"]
          triage_doc = root / "docs/04-operations/incident-response.md"
          if not triage_doc.exists():
              raise SystemExit("e2e mapping failed: docs/04-operations/incident-response.md missing")
          bad_e2e = [row["id"] for row in e2e_scenarios if not row.get("entrypoint")]
          if bad_e2e:
              raise SystemExit("e2e scenarios missing entrypoint: " + ", ".join(sorted(bad_e2e)))
          (report_root / "ops-alert-runbook-slo-load-e2e-map.json").write_text(json.dumps({
              "schema_version": 1,
              "kind": "ops_alert_runbook_slo_load_e2e_map",
              "status": "ok",
              "alert_count": len(alerts),
              "runbook_count": len(runbook_ids),
              "slo_count": len(slos),
              "sli_count": len(slis),
              "load_suite_count": len(load_suites),
              "e2e_scenario_count": len(e2e_scenarios)
          }, indent=2) + "\n")
          PY
          # Registry contract groups must not be empty (domain and suite).
          python - <<'PY'
          import pathlib, tomllib, json
          report_root = pathlib.Path(__import__("os").environ["REPORT_ROOT"])
          reg = tomllib.loads(pathlib.Path("ops/inventory/registry.toml").read_text())
          checks = reg.get("checks", [])
          suites = reg.get("suites", [])
          domain_counts = {}
          for row in checks:
              d = row.get("domain","").strip()
              domain_counts[d] = domain_counts.get(d,0)+1
          empty_domains = sorted([d for d,c in domain_counts.items() if d and c == 0])
          empty_suite_refs = sorted([s.get("id","") for s in suites if not s.get("checks")])
          if empty_domains or empty_suite_refs:
