          unused_schemas = sorted(all_schemas - referenced_schema_targets)
          if unused_schemas:
              violations.append("unused schema files detected: " + ", ".join(unused_schemas[:20]))
          missing_schema_examples = []
          for schema_path in sorted(referenced_schema_targets):
              # require at least one mapped file for schema path
              has_mapped = any(target == schema_path for target in (schema_map.get("files") or {}).values())
              if not has_mapped:
                  missing_schema_examples.append(schema_path)
          if missing_schema_examples:
              violations.append("schema without mapped examples/config files: " + ", ".join(missing_schema_examples[:20]))

          # Config key registry SSOT / usage / hidden-default checks.
          registry_keys = sorted(config_keys_registry.get("allowed_env", []))
          key_usage = []
          all_code_files = []
          for code_root in ("crates", "ops", "configs"):
              base = root / code_root
              if not base.exists():
                  continue
              for p in base.rglob("*"):
                  if not p.is_file():
                      continue
                  if p.suffix not in {".rs", ".toml", ".json", ".yaml", ".yml", ".md", ".txt"}:
                      continue
                  all_code_files.append(p)
          code_text_cache = {}
          for p in all_code_files:
              try:
                  code_text_cache[p.as_posix()] = p.read_text()
              except Exception:
                  code_text_cache[p.as_posix()] = ""
          for key in registry_keys:
              hit_count = 0
              sample_paths = []
              for path, text in code_text_cache.items():
                  if key in text:
                      hit_count += 1
                      if len(sample_paths) < 5:
                          sample_paths.append(path)
              key_usage.append({"key": key, "hits": hit_count, "sample_paths": sample_paths})
          # enforce runtime ATLAS_* keys have at least one code reference
          missing_key_usage = [row["key"] for row in key_usage if row["key"].startswith("ATLAS_") and row["hits"] == 0]
          if missing_key_usage:
              violations.append("config keys missing code usage mapping: " + ", ".join(missing_key_usage[:20]))
          # hidden defaults / undeclared keys
          declared = set(registry_keys)
          undeclared_keys = set()
          for path, text in code_text_cache.items():
              for match in re.findall(r"ATLAS_[A-Z0-9_]+", text):
                  if match not in declared:
                      undeclared_keys.add(match)
          if undeclared_keys:
              violations.append("undeclared ATLAS_ keys found outside config key registry: " + ", ".join(sorted(undeclared_keys)[:20]))

          # Rename compatibility policy.
          if rename_policy.get("schema_version") != 1:
              violations.append("configs/sources/governance/policy/config-key-renames.json schema_version must be 1")
          rename_violations = []
          for row in rename_policy.get("renames", []):
              old_key = row.get("old_key", "")
              new_key = row.get("new_key", "")
              if not old_key.startswith("ATLAS_") or not new_key.startswith("ATLAS_"):
                  rename_violations.append(f"invalid rename row {row}")
                  continue
              if new_key not in declared:
                  rename_violations.append(f"rename target not present in config key registry: {new_key}")
          if rename_violations:
              violations.append("config key rename policy violations: " + "; ".join(rename_violations[:20]))

          # Secrets scan on stable configs: zero tolerance.
          secret_hits = []
          secret_patterns = [
              r"AKIA[0-9A-Z]{16}",
              r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----",
              r"(?i)(password|secret|token)\\s*[:=]\\s*[\"'][^\"']+[\"']",
          ]
          for rel in sorted(structured_files):
              if rel.startswith("configs/generated/"):
                  continue
              txt = (root / rel).read_text()
              for pat in secret_patterns:
                  if re.search(pat, txt):
                      secret_hits.append({"path": rel, "pattern": pat})
                      break
          if secret_hits:
              violations.append("secrets scan failed for stable configs: " + json.dumps(secret_hits[:20]))

          # Change checklist quality gate.
          # Semantic diff / debt / graph artifacts.
          rows = []
          for rel in sorted(tracked_files):
              data = (root / rel).read_bytes()
              rows.append({"path": rel, "sha256": __import__("hashlib").sha256(data).hexdigest(), "bytes": len(data)})
          semantic_diff_payload = {
              "schema_version": 1,
              "kind": "configs_semantic_diff",
              "status": "ok",
              "rows": rows,
          }
          (report_root / "configs-semantic-diff.json").write_text(json.dumps(semantic_diff_payload, indent=2) + "\n")
          debt_payload = {
              "schema_version": 1,
              "kind": "config_debt_ledger",
              "status": "warn" if (missing_owner or missing_consumer or missing_schema_or_justification or unused_schemas) else "ok",
              "missing_owner": missing_owner,
              "missing_consumer": missing_consumer,
              "missing_schema_or_justification": missing_schema_or_justification,
              "unused_schemas": unused_schemas,
          }
          (report_root / "config-debt-ledger.json").write_text(json.dumps(debt_payload, indent=2) + "\n")
          key_usage_payload = {
              "schema_version": 1,
              "kind": "config_key_usage_map",
              "status": "ok",
              "rows": key_usage,
              "registry_path": "configs/schemas/contracts/env.schema.json",
          }
          (report_root / "config-key-usage-map.json").write_text(json.dumps(key_usage_payload, indent=2) + "\n")

          debt_total = len(missing_owner) + len(missing_consumer) + len(missing_schema_or_justification) + len(unused_schemas)
          if debt_total > 20:
              violations.append(f"config debt ledger exceeds top-20 budget: {debt_total}")

          if violations:
              raise SystemExit("configs taxonomy contracts failed: " + "; ".join(violations[:20]))
          payload = {
              "schema_version": 1,
              "kind": "configs_taxonomy_contracts",
              "status": "ok",
              "max_depth": max_depth,
              "max_files_per_dir": max_files_per_dir,
              "allowed_groups": sorted(allowed_groups),
              "checked_files": len(file_depth),
              "duplicate_tree_tails": duplicated_tails,
              "group_lifecycle": group_stability,
              "warnings": warnings,
          }
          (report_root / "configs-taxonomy-contracts.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY
          cargo run --locked -q -p bijux-dev-atlas -- configs graph --allow-write --strict --format json > "${report_root}/configs-graph.json"
          cargo run --locked -q -p bijux-dev-atlas -- configs explain configs/registry/inventory/configs.json --strict --format json > "${report_root}/configs-explain-configs-json.json"
          cargo run --locked -q -p bijux-dev-atlas -- configs diff --strict --format json > "${report_root}/configs-diff.json"
          cargo run --locked -q -p bijux-dev-atlas -- docs shrink-report --strict --format json > "${report_root}/docs-shrink-report.json"
          ! grep -nE "(AKIA|BEGIN PRIVATE KEY|SECRET|TOKEN=)" "${report_root}/ci-fast.json"
          printf -- "- lane: ci-fast\n- report: %s\n- cache registry hit: %s\n- cache target hit: %s\n" \
            "${report_root}/ci-fast.json" "${CACHE_REGISTRY_HIT}" "${CACHE_TARGET_HIT}" > "artifacts/${RUN_ID}/summary.md"
          printf "\n- contracts all: %s\n- docs required: %s\n- docs required membership: %s\n- configs required: %s\n- configs required membership: %s\n- wrappers required: %s\n- wrappers required membership: %s\n- repo required: %s\n- repo required membership: %s\n- repo integrity summary: %s\n- contracts runtime static: %s\n- contracts control-plane static: %s\n- contracts configs static: %s\n- contracts wrappers static: %s\n- ops validation: %s\n- docker check: %s\n- coverage: %s\n" \
            "${contracts_root}/all.json" "${contracts_root}/docs-required.json" "${report_root}/suite-membership-docs_required.json" "${contracts_root}/configs-required.json" "${report_root}/suite-membership-configs_required.json" "${contracts_root}/make-required.json" "${report_root}/suite-membership-make_required.json" "${contracts_root}/repo-required.json" "${report_root}/suite-membership-repo_required.json" "${report_root}/repo-integrity-summary.json" "${contracts_root}/runtime-static.json" "${contracts_root}/control-plane-static.json" "${contracts_root}/configs-static.json" "${contracts_root}/make-static.txt" "${contracts_root}/ops-validate.json" "${contracts_root}/docker-check.json" "${contracts_root}/coverage-summary.json" >> "artifacts/${RUN_ID}/summary.md"
          printf -- "- repo surface diff: %s\n- root change report: %s\n- governance validate: %s\n- governance coverage diff: %s\n- semantic drift summary: %s\n- wrapper surface drift: %s\n- deterministic check order: %s\n- check metadata catalog: %s\n- artifact schema check: %s\n- artifact naming and size: %s\n- docs golden workflow verification: %s\n- docs link allowlist policy: %s\n- alert runbook slo load e2e mapping: %s\n- registry group coverage: %s\n- contract coverage heatmap: %s\n- missing proof report: %s\n- proof debt ledger: %s\n- contract flake detector: %s\n- contract performance budget: %s\n- docs entrypoint and budget contracts: %s\n- docs navigation and semantics contracts: %s\n- docs quality contracts: %s\n- configs taxonomy contracts: %s\n- configs semantic diff: %s\n- config debt ledger: %s\n- config key usage map: %s\n- configs graph: %s\n- configs explain: %s\n- configs diff: %s\n- docs shrink report: %s\n" "${report_root}/repo-surface-diff.json" "${report_root}/root-change-report.json" "${report_root}/governance-validate.json" "${report_root}/governance-coverage-diff.json" "${report_root}/semantic-drift-summary.json" "${report_root}/make-surface-drift.json" "${report_root}/deterministic-check-order.json" "${report_root}/check-metadata-catalog.json" "${report_root}/artifact-schema-version-check.json" "${report_root}/artifact-naming-and-size.json" "${report_root}/docs-golden-workflow-verification.json" "${report_root}/docs-link-allowlist-policy.json" "${report_root}/ops-alert-runbook-slo-load-e2e-map.json" "${report_root}/registry-group-coverage.json" "${report_root}/contract-coverage-heatmap.json" "${report_root}/missing-proof-report.json" "${report_root}/proof-debt-ledger.json" "${report_root}/contract-flake-detector.json" "${report_root}/contract-performance-budget.json" "${report_root}/docs-entrypoint-and-budget-contracts.json" "${report_root}/docs-navigation-and-semantics-contracts.json" "${report_root}/docs-quality-contracts.json" "${report_root}/configs-taxonomy-contracts.json" "${report_root}/configs-semantic-diff.json" "${report_root}/config-debt-ledger.json" "${report_root}/config-key-usage-map.json" "${report_root}/configs-graph.json" "${report_root}/configs-explain-configs-json.json" "${report_root}/configs-diff.json" "${report_root}/docs-shrink-report.json" >> "artifacts/${RUN_ID}/summary.md"
          if [ -f "${contracts_root}/root-strict.json" ]; then
            printf -- "- root strict: %s\n" "${contracts_root}/root-strict.json" >> "artifacts/${RUN_ID}/summary.md"
          fi
          if ! git diff --quiet; then
            git status --short > "${report_root}/repo-write-drift.txt"
            jq -n --rawfile dirty "${report_root}/repo-write-drift.txt" '{
              schema_version: 1,
              kind: "repo_write_drift",
              status: "failed",
              dirty: ($dirty | split("\n") | map(select(length>0)))
            }' > "${report_root}/repo-write-drift.json"
            echo "repository changed during checks; checks must write only to artifacts" >&2
            exit 1
          fi
          jq -n '{schema_version:1,kind:"repo_write_drift",status:"ok",dirty:[]}' > "${report_root}/repo-write-drift.json"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Save cargo registry cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-pr-minimal/registry
            .cache/cargo/home/ci-pr-minimal/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Save cargo target cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-pr-minimal
          key: cargo-target-pr-minimal-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ci-pr-minimal-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5

  validate-pr:
    if: needs.route-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: route-changes
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/ci-pr
      CARGO_TARGET_DIR: .cache/cargo/target/ci-pr
      CARGO_HOME: .cache/cargo/home/ci-pr
      NEXTEST_CACHE_DIR: .cache/cargo/nextest/ci-pr
      TMPDIR: artifacts/isolates/ci-pr/tmp
      TMP: artifacts/isolates/ci-pr/tmp
      TEMP: artifacts/isolates/ci-pr/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Restore cargo registry cache
        id: cache-registry
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-pr/registry
            .cache/cargo/home/ci-pr/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Restore cargo target cache
        id: cache-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-pr
          key: cargo-target-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Install docs toolchain
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r configs/sources/repository/docs/requirements.lock.txt
      - name: Run PR lane
        shell: bash
        env:
          CACHE_REGISTRY_HIT: ${{ steps.cache-registry.outputs.cache-hit || 'false' }}
          CACHE_TARGET_HIT: ${{ steps.cache-target.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ci-pr"
          mkdir -p "${report_root}" "${logs_root}"
          make FORMAT=json doctor > "${logs_root}/doctor.stdout.log" 2> "${logs_root}/doctor.stderr.log"
          cp "artifacts/doctor/${RUN_ID}/report.json" "${report_root}/doctor.json"
          cp "artifacts/doctor/${RUN_ID}/touched-paths-report.json" "${report_root}/doctor-touched-paths.json"
          make help > "${logs_root}/make-help.stdout.log" 2> "${logs_root}/make-help.stderr.log"
          make makes-target-list > "${logs_root}/makes-target-list.stdout.log" 2> "${logs_root}/makes-target-list.stderr.log"
          cp makes/target-list.json "${report_root}/makes-target-list.json"
          cargo run --locked -q -p bijux-dev-atlas -- check run --domain root --tag lint --format json > "${logs_root}/lint-policy-report.stdout.log" 2> "${logs_root}/lint-policy-report.stderr.log"
          printf 'workspace_lints_file=Cargo.toml\nclippy_conf_dir=configs/sources/repository/rust-tooling\n' > "${report_root}/effective-clippy-policy.txt"
          cargo run --locked -q -p bijux-dev-atlas -- check run --domain root --tag lint --format json > "${logs_root}/lint-policy-enforce.stdout.log" 2> "${logs_root}/lint-policy-enforce.stderr.log"
          CLIPPY_CONF_DIR=configs/sources/repository/rust-tooling cargo clippy --locked --workspace --all-targets --all-features --message-format=json -- -D warnings > "${report_root}/clippy.json" 2> "${logs_root}/lint-clippy-json.stderr.log"
          cargo tree --locked -p bijux-atlas --edges normal --no-default-features --features backend-local > "${report_root}/store-deps-backend-local.txt"
          cargo tree --locked -p bijux-atlas --edges normal --no-default-features --features backend-s3 > "${report_root}/store-deps-backend-s3.txt"
          local_dep_count="$(wc -l < "${report_root}/store-deps-backend-local.txt")"
          s3_dep_count="$(wc -l < "${report_root}/store-deps-backend-s3.txt")"
          [ "${s3_dep_count}" -gt "${local_dep_count}" ]
          printf '{"schema_version":1,"kind":"store_backend_dependency_surface","backend_local_count":%s,"backend_s3_count":%s}\n' "${local_dep_count}" "${s3_dep_count}" > "${report_root}/store-deps-diff.json"
          cp ops/inventory/release-build-profile.json "${report_root}/store-release-backend-profile.json"
          cargo check --locked -q -p bijux-atlas --no-default-features --features backend-local > "${logs_root}/store-backend-local-check.stdout.log" 2> "${logs_root}/store-backend-local-check.stderr.log"
          cargo check --locked -q -p bijux-atlas --no-default-features --features backend-s3 > "${logs_root}/store-backend-s3-check.stdout.log" 2> "${logs_root}/store-backend-s3-check.stderr.log"
          cargo test --locked -q -p bijux-atlas --test store --no-default-features --features backend-local local_backend_roundtrip_is_hermetic -- --exact > "${logs_root}/store-backend-local-test.stdout.log" 2> "${logs_root}/store-backend-local-test.stderr.log"
          cargo test --locked -q -p bijux-atlas --test store --no-default-features --features backend-s3 http_backend_reads_from_hermetic_cached_objects -- --exact > "${logs_root}/store-backend-s3-test.stdout.log" 2> "${logs_root}/store-backend-s3-test.stderr.log"
          cargo fmt --locked --all -- --check --config-path configs/sources/repository/rust-tooling/rustfmt.toml > "${logs_root}/fmt-check.stdout.log" 2> "${logs_root}/fmt-check.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- configs verify --format json > "${report_root}/configs-verify.json" 2> "${logs_root}/configs-verify.stderr.log"
          cargo test --locked --workspace > "${logs_root}/workspace-test.stdout.log" 2> "${logs_root}/workspace-test.stderr.log"
          cargo test --locked -q -p bijux-atlas --test api openapi_snapshot_is_deterministic_and_matches_committed_contract -- --exact > "${logs_root}/openapi-snapshot.stdout.log" 2> "${logs_root}/openapi-snapshot.stderr.log"
          cargo test --locked -q -p bijux-atlas --test api openapi_hash_matches_pinned_contract -- --exact > "${logs_root}/openapi-hash.stdout.log" 2> "${logs_root}/openapi-hash.stderr.log"
          cargo test --locked -q -p bijux-atlas runtime_startup_config_contract_artifacts_match_generated > "${logs_root}/runtime-startup-config-contract.stdout.log" 2> "${logs_root}/runtime-startup-config-contract.stderr.log"
          mkdocs build --strict > "${report_root}/mkdocs-build.json" 2> "${logs_root}/mkdocs-build.stderr.log"
          cp -R artifacts/docs/site "artifacts/${RUN_ID}/site-preview"
          cargo run --locked -q -p bijux-dev-atlas -- docs external-links --allow-network --format json > "${report_root}/docs-linkcheck.json" 2> "${logs_root}/docs-linkcheck.stderr.log"
          make docker > "${logs_root}/docker.stdout.log" 2> "${logs_root}/docker.stderr.log"
          make ops-contracts > "${logs_root}/ops-contracts-static.stdout.log" 2> "${logs_root}/ops-contracts-static.stderr.log"
          make FORMAT=json ci-pr > "${report_root}/ci-pr.json" 2> "${logs_root}/ci-pr.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- check list --suite ci_pr --include-internal --include-slow --format json > "${report_root}/suite-membership-ci_pr.json"
          ! grep -nE "(AKIA|BEGIN PRIVATE KEY|SECRET|TOKEN=)" "${report_root}/ci-pr.json"
          printf -- "- lane: ci-pr\n- report: %s\n- docs build: %s\n- docs linkcheck: %s\n- docs preview: %s\n- cache registry hit: %s\n- cache target hit: %s\n" \
            "${report_root}/ci-pr.json" "${report_root}/mkdocs-build.json" "${report_root}/docs-linkcheck.json" "artifacts/${RUN_ID}/site-preview" "${CACHE_REGISTRY_HIT}" "${CACHE_TARGET_HIT}" > "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Save cargo registry cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-pr/registry
            .cache/cargo/home/ci-pr/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Save cargo target cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-pr
          key: cargo-target-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ci-pr-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/ci-supply-chain
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/ci-supply-chain
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/ci-supply-chain
      NEXTEST_CACHE_DIR: .cache/cargo/nextest/ci-supply-chain
      TMPDIR: artifacts/isolates/ci-supply-chain/tmp
      TMP: artifacts/isolates/ci-supply-chain/tmp
      TEMP: artifacts/isolates/ci-supply-chain/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - name: Restore cargo registry cache
        id: cache-registry
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-supply-chain/registry
            .cache/cargo/home/ci-supply-chain/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Restore cargo target cache
        id: cache-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-supply-chain
          key: cargo-target-pr-supply-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Run audit lane
        shell: bash
        env:
          CACHE_REGISTRY_HIT: ${{ steps.cache-registry.outputs.cache-hit || 'false' }}
          CACHE_TARGET_HIT: ${{ steps.cache-target.outputs.cache-hit || 'false' }}
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/ci-supply-chain"
          mkdir -p "${report_root}" "${logs_root}"
          mkdir -p artifacts/governance
          cargo run --locked -q -p bijux-dev-atlas -- governance exceptions validate --repo-root "${GITHUB_WORKSPACE}" --format json > "${logs_root}/governance-exceptions.stdout.log" 2> "${logs_root}/governance-exceptions.stderr.log" || true
          cargo run --locked -q -p bijux-dev-atlas -- governance deprecations validate --repo-root "${GITHUB_WORKSPACE}" --format json > "${logs_root}/governance-deprecations.stdout.log" 2> "${logs_root}/governance-deprecations.stderr.log" || true
          cargo run --locked -q -p bijux-dev-atlas -- governance breaking validate --repo-root "${GITHUB_WORKSPACE}" --format json > "${logs_root}/governance-breaking.stdout.log" 2> "${logs_root}/governance-breaking.stderr.log" || true
          cargo run --locked -q -p bijux-dev-atlas -- governance doctor --repo-root "${GITHUB_WORKSPACE}" --format json > "${logs_root}/governance-doctor.stdout.log" 2> "${logs_root}/governance-doctor.stderr.log" || true
          for file in \
            artifacts/governance/exceptions-summary.json \
            artifacts/governance/exceptions-expiry-warning.json \
            artifacts/governance/exceptions-churn.json \
            artifacts/governance/deprecations-summary.json \
            artifacts/governance/compat-warnings.json \
            artifacts/governance/breaking-changes.json \
            artifacts/governance/governance-doctor.json \
            artifacts/governance/institutional-delta.md \
            artifacts/governance/institutional-delta-inputs.json; do
            test -f "${file}" || { echo "missing governance evidence file: ${file}" >&2; exit 1; }
          done
          cargo run --locked -q -p bijux-dev-atlas -- security validate --format json > "${report_root}/security-validate.json" 2> "${logs_root}/security-validate.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- security dependency-audit --format json > "${report_root}/security-dependency-audit.json" 2> "${logs_root}/security-dependency-audit.stderr.log"
          printf '{"schema_version":1,"kind":"supply_chain_report_v1","commands":["bijux-dev-atlas security validate --format json","bijux-dev-atlas security dependency-audit --format json"],"status":"ok","reports":["security-validate.json","security-dependency-audit.json"]}\n' > "${report_root}/supply-chain.json"
          ! grep -nE "(AKIA|BEGIN PRIVATE KEY|SECRET|TOKEN=)" "${report_root}/supply-chain.json"
          printf -- "- lane: supply-chain\n- report: %s\n- cache registry hit: %s\n- cache target hit: %s\n" \
            "${report_root}/supply-chain.json" "${CACHE_REGISTRY_HIT}" "${CACHE_TARGET_HIT}" > "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Save cargo registry cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            .cache/cargo/home/ci-supply-chain/registry
            .cache/cargo/home/ci-supply-chain/git
          key: cargo-registry-pr-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Save cargo target cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/ci-supply-chain
          key: cargo-target-pr-supply-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ci-supply-chain-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5

  workflow-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Run workflow policy verifier
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- ci verify workflow-policy --format json

  docker-runtime-image:
    if: needs.route-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: route-changes
    env:
      ISO_ROOT: artifacts/isolates/ci-pr-docker
      TMPDIR: artifacts/isolates/ci-pr-ops/docker/tmp
      TMP: artifacts/isolates/ci-pr-ops/docker/tmp
      TEMP: artifacts/isolates/ci-pr-ops/docker/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Run docker gate lane
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifacts/${RUN_ID}"
          make docker > "artifacts/${RUN_ID}/docker.stdout.log" 2> "artifacts/${RUN_ID}/docker.stderr.log"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: docker-runtime-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5
