name: docker-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-runtime-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bijux-atlas-runtime
      DOCKERFILE_PATH: ops/docker/images/runtime/Dockerfile
      RUNTIME_CONFIG_EXAMPLE: ops/docker/images/runtime/runtime-config.example.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Derive release metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="manual-${GITHUB_RUN_NUMBER}"
          fi
          sha_tag="sha-${GITHUB_SHA::12}"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "VERSION_TAG=${version}" >> "${GITHUB_ENV}"
          echo "SHA_TAG=${sha_tag}" >> "${GITHUB_ENV}"
          echo "BUILD_DATE=${created}" >> "${GITHUB_ENV}"

      - name: Login to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Prepare buildx and arm64 emulation
        shell: bash
        run: |
          set -euo pipefail
          docker run --privileged --rm tonistiigi/binfmt --install arm64
          docker buildx create --name bijux-publisher --use
          docker buildx inspect --bootstrap

      - name: Build amd64 smoke image and enforce size budget
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/docker-publish
          docker buildx build \
            --platform linux/amd64 \
            --pull=false \
            --load \
            -f "${DOCKERFILE_PATH}" \
            -t "${IMAGE_NAME}:local-smoke" \
            --build-arg IMAGE_VERSION="${VERSION_TAG}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg IMAGE_PROVENANCE="${VERSION_TAG}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${VERSION_TAG}" \
            --label "org.opencontainers.image.created=${BUILD_DATE}" \
            --label "org.opencontainers.image.licenses=Apache-2.0" \
            .
          docker run --rm --entrypoint /app/bijux-atlas "${IMAGE_NAME}:local-smoke" version > artifacts/docker-publish/startup-smoke.txt
          size_bytes="$(docker image inspect "${IMAGE_NAME}:local-smoke" --format '{{.Size}}')"
          budget_bytes="$(jq -r '.runtime_image_max_bytes' ops/docker/policy.json)"
          jq -n \
            --arg image "${IMAGE_NAME}:local-smoke" \
            --argjson size "${size_bytes}" \
            --argjson budget "${budget_bytes}" \
            '{image:$image,size_bytes:$size,budget_bytes:$budget,within_budget:($size <= $budget)}' \
            > artifacts/docker-publish/image-size-budget.json
          jq -e '.within_budget == true' artifacts/docker-publish/image-size-budget.json > /dev/null

      - name: Build and publish multi-arch runtime image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --pull=false \
            --push \
            --provenance=mode=max \
            --sbom=true \
            -f "${DOCKERFILE_PATH}" \
            -t "${IMAGE_NAME}:${VERSION_TAG}" \
            -t "${IMAGE_NAME}:${SHA_TAG}" \
            --build-arg IMAGE_VERSION="${VERSION_TAG}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg IMAGE_PROVENANCE="${VERSION_TAG}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${VERSION_TAG}" \
            --label "org.opencontainers.image.created=${BUILD_DATE}" \
            --label "org.opencontainers.image.licenses=Apache-2.0" \
            .

      - name: Collect digest and provenance bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/docker-publish
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION_TAG}" --raw > artifacts/docker-publish/imagetools-raw.json
          digest="$(jq -r '.manifests[0].digest // empty' artifacts/docker-publish/imagetools-raw.json)"
          jq -n \
            --arg image "${IMAGE_NAME}" \
            --arg version_tag "${VERSION_TAG}" \
            --arg sha_tag "${SHA_TAG}" \
            --arg digest "${digest}" \
            --arg source "https://github.com/${GITHUB_REPOSITORY}" \
            --arg revision "${GITHUB_SHA}" \
            --arg created "${BUILD_DATE}" \
            '{image:$image,version_tag:$version_tag,sha_tag:$sha_tag,digest:$digest,source:$source,revision:$revision,created:$created}' \
            > artifacts/docker-publish/provenance-bundle.json
          jq -n \
            --arg image "${IMAGE_NAME}:${VERSION_TAG}" \
            --arg digest "${digest}" \
            '{images:[{image:$image,digest:$digest}]}' \
            > artifacts/docker-publish/image-digests.json

      - name: Install Syft and Trivy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "${HOME}/.local/bin" v1.18.0
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "${HOME}/.local/bin" v0.57.1
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Generate SBOM and vulnerability report artifacts
        shell: bash
        run: |
          set -euo pipefail
          syft "${IMAGE_NAME}:${VERSION_TAG}" -o spdx-json > artifacts/docker-publish/sbom.spdx.json
          syft "${IMAGE_NAME}:${VERSION_TAG}" -o cyclonedx-json > artifacts/docker-publish/sbom.cyclonedx.json
          trivy image --format json --quiet --output artifacts/docker-publish/scan.trivy.json "${IMAGE_NAME}:${VERSION_TAG}"

      - name: Upload docker publish artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docker-publish-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/docker-publish
          retention-days: 14
