name: system-simulation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "crates/bijux-dev-atlas/src/commands/system.rs"
      - "configs/system/**"
      - ".github/workflows/system-simulation.yml"

permissions:
  contents: read

concurrency:
  group: system-simulation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.84.1
      - name: Run deterministic simulation suite
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- system simulate suite --output-format json > artifacts/system/simulation/run.json
          test -f artifacts/system/simulation/index.json
          test -f artifacts/system/simulation/coverage.json
          test -f artifacts/system/simulation/resilience-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: system-simulation-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/system/simulation
          retention-days: 14
