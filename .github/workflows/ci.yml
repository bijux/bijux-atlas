name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out the repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0
          components: rustfmt

      - name: Restore the Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run formatting checks
        run: make gh-fmt

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0
          components: clippy

      - name: Restore the Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run lint checks
        run: make gh-lint

  security:
    name: Security
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/security
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/security
      TMPDIR: artifacts/isolates/security/tmp
      TMP: artifacts/isolates/security/tmp
      TEMP: artifacts/isolates/security/tmp
    steps:
      - name: Check out the repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0

      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"

      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"

      - name: Run security checks
        run: make gh-security

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/test
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/test
      TMPDIR: artifacts/isolates/test/tmp
      TMP: artifacts/isolates/test/tmp
      TEMP: artifacts/isolates/test/tmp
    steps:
      - name: Check out the repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0

      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"

      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"

      - name: Install cargo-nextest
        run: make gh-test-install-rust-tools

      - name: Expose cargo binaries
        shell: bash
        run: |
          set -euo pipefail
          echo "${CARGO_HOME}/bin" >> "${GITHUB_PATH}"

      - name: Run test suites
        run: make gh-test
