name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.86.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: configs/sources/repository/docs/requirements.lock.txt

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: configs/sources/repository/docs/package-lock.json

      - name: Restore the Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install docs toolchain
        run: make gh-docs-install

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Validate docs output directory contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re
          mkdocs_text = pathlib.Path("mkdocs.yml").read_text()
          shared_text = pathlib.Path("mkdocs.shared.yml").read_text()
          site_dir_match = re.search(r"(?m)^site_dir:\s*(\S+)\s*$", mkdocs_text)
          site_dir = site_dir_match.group(1) if site_dir_match else "site"
          if site_dir != "artifacts/docs/site":
              raise SystemExit(f"mkdocs site_dir must be artifacts/docs/site, got: {site_dir}")
          if "_drafts/**" not in mkdocs_text:
              raise SystemExit("mkdocs exclude_docs must include _drafts/**")
          if "strict: true" not in shared_text:
              raise SystemExit("mkdocs strict must be true in mkdocs.shared.yml")
          if "custom_dir: docs/overrides" not in shared_text:
              raise SystemExit("mkdocs theme.custom_dir must point at docs/overrides")
          if "hooks:" not in shared_text or "docs/hooks/publish_site_assets.py" not in shared_text:
              raise SystemExit("mkdocs must publish site assets through docs/hooks/publish_site_assets.py")
          if "assets/javascripts/vendor/mermaid-11.6.0.min.js" not in mkdocs_text:
              raise SystemExit("mkdocs must use local mermaid vendor bundle")
          PY

      - name: Build docs site
        run: make docs-check

      - name: Validate published site root assets
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/docs/site/favicon.ico
          test -f artifacts/docs/site/apple-touch-icon.png
          test -f artifacts/docs/site/apple-touch-icon-precomposed.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: artifacts/docs/site

  deploy:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
