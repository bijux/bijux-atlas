name: publish-crates-io

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

concurrency:
  group: publish-crates-io-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            echo "unable to resolve release tag for event ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "${version}" == "${tag}" ]]; then
            echo "tag ${tag} must use v<semver> format" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate workspace version matches tag
        shell: bash
        run: |
          set -euo pipefail
          workspace_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_ws=1; next }
              /^\[/ && in_ws { exit }
              in_ws && $0 ~ /^version[[:space:]]*=/ {
                gsub(/^[[:space:]]*version[[:space:]]*=[[:space:]]*"/, "", $0)
                gsub(/".*$/, "", $0)
                print $0
                exit
              }
            ' Cargo.toml
          )"
          if [[ -z "${workspace_version}" ]]; then
            echo "workspace.package.version not found in Cargo.toml" >&2
            exit 1
          fi
          if [[ "${workspace_version}" != "${{ steps.release_tag.outputs.version }}" ]]; then
            echo "workspace version ${workspace_version} does not match tag version ${{ steps.release_tag.outputs.version }}" >&2
            exit 1
          fi

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          publish_with_retry() {
            crate="$1"
            attempts=10
            delay=30
            for i in $(seq 1 "${attempts}"); do
              echo "publishing ${crate} (attempt ${i}/${attempts})"
              if cargo publish --locked -p "${crate}"; then
                return 0
              fi
              if [[ "${i}" -lt "${attempts}" ]]; then
                echo "publish failed for ${crate}; waiting ${delay}s for crates.io index propagation"
                sleep "${delay}"
              fi
            done
            echo "publishing ${crate} failed after ${attempts} attempts" >&2
            return 1
          }

          publish_with_retry bijux-atlas-core
          publish_with_retry bijux-atlas-model
          publish_with_retry bijux-atlas-policies
          publish_with_retry bijux-atlas-store
          publish_with_retry bijux-atlas-query
          publish_with_retry bijux-atlas-api
          publish_with_retry bijux-atlas-ingest
          publish_with_retry bijux-atlas-client
          publish_with_retry bijux-atlas-cli
          publish_with_retry bijux-atlas-server
