name: Bijux Standard Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  bijux_std:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Run bijux standard checks
        run: make bijux-std-checks
