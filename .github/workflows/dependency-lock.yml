name: dependency-lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      ISO_ROOT: artifacts/isolates/dependency-lock
      CARGO_TARGET_DIR: artifacts/isolates/dependency-lock/target
      CARGO_HOME: artifacts/isolates/dependency-lock/cargo-home
      TMPDIR: artifacts/isolates/dependency-lock/tmp
      TMP: artifacts/isolates/dependency-lock/tmp
      TEMP: artifacts/isolates/dependency-lock/tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Normalize isolated roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "ISO_ROOT=${GITHUB_WORKSPACE}/${ISO_ROOT}" >> "${GITHUB_ENV}"
          echo "CARGO_TARGET_DIR=${GITHUB_WORKSPACE}/${CARGO_TARGET_DIR}" >> "${GITHUB_ENV}"
          echo "CARGO_HOME=${GITHUB_WORKSPACE}/${CARGO_HOME}" >> "${GITHUB_ENV}"
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - name: Prepare isolated roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - name: Refresh lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
      - name: Verify only Cargo.lock changed
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- ci verify dependency-lock --allow-git --format json
      - name: Open lockfile PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          commit-message: "chore(deps): refresh Cargo.lock via locked workflow"
          title: "chore(deps): refresh Cargo.lock"
          body: "Automated dependency lock refresh. This is the only allowed automated lockfile update path."
          branch: automation/dependency-lock-refresh
          delete-branch: true
