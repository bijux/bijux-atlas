name: release-candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release candidate version"
        required: true
      run_release_doctor:
        description: "Run release doctor gate"
        required: true
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

env:
  RUN_ID: rc-${{ github.run_id }}-${{ github.run_attempt }}
  GITHUB_REF: ${{ github.ref }}
  LC_ALL: C
  TZ: UTC

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/release-candidate
      CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo/target/release-candidate
      CARGO_HOME: ${{ github.workspace }}/.cache/cargo/home/release-candidate
      TMPDIR: artifacts/isolates/release-candidate/tmp
      TMP: artifacts/isolates/release-candidate/tmp
      TEMP: artifacts/isolates/release-candidate/tmp
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
      - name: Run release candidate preflight
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- ci verify release-candidate --allow-git --format json
      - name: Prepare run artifact directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "artifacts/${RUN_ID}"
          mkdir -p "artifacts/${RUN_ID}"
      - name: Run release doctor gate
        if: ${{ github.event.inputs.run_release_doctor == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- check doctor --format json > /dev/null
      - name: Run docs completeness gate
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}" "${logs_root}"
          set +e
          cargo run --locked -q -p bijux-dev-atlas -- docs validate --format json --out "${report_root}/docs-completeness.json" > /dev/null 2> "${logs_root}/docs-completeness.stderr.log"
          docs_exit=$?
          set -e
          if [[ "${docs_exit}" -ne 0 ]]; then
            printf '{"schema_version":1,"status":"warn","text":"docs validate reported non-zero exit","exit_code":%s}\n' "${docs_exit}" > "${report_root}/docs-completeness-gate.json"
          else
            printf '{"schema_version":1,"status":"ok","text":"docs validate passed","exit_code":0}\n' > "${report_root}/docs-completeness-gate.json"
          fi
      - name: Generate reproducibility evidence
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}" "${logs_root}"
          set +e
          cargo run --locked -q -p bijux-dev-atlas -- release reproducibility report --format json > "${report_root}/reproducibility-report.json" 2> "${logs_root}/reproducibility-report.stderr.log"
          repro_exit=$?
          set -e
          if [[ "${repro_exit}" -ne 0 ]]; then
            printf '{"schema_version":1,"status":"warn","text":"release reproducibility report returned non-zero exit","exit_code":%s}\n' "${repro_exit}" > "${report_root}/reproducibility-gate.json"
          else
            printf '{"schema_version":1,"status":"ok","text":"release reproducibility report completed","exit_code":0}\n' > "${report_root}/reproducibility-gate.json"
          fi
      - name: Run release check gate
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}"
          set +e
          cargo run --locked -q -p bijux-dev-atlas -- release check --format json > "${report_root}/release-check.json" 2> "${logs_root}/release-check.stderr.log"
          release_check_exit=$?
          set -e
          if [[ "${release_check_exit}" -ne 0 ]]; then
            printf '{"schema_version":1,"status":"warn","text":"release check reported non-zero exit","exit_code":%s}\n' "${release_check_exit}" > "${report_root}/release-check-gate.json"
          else
            printf '{"schema_version":1,"status":"ok","text":"release check passed","exit_code":0}\n' > "${report_root}/release-check-gate.json"
          fi
      - name: Run release contracts lane
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}" "${logs_root}"
          ARTIFACT_ROOT="${report_root}" RUN_ID="${RUN_ID}" make contracts-release > "${report_root}/contracts-release.txt" 2> "${logs_root}/contracts-release.stderr.log"
      - name: Run ops readiness gate
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}" "${logs_root}"
          set +e
          cargo run --locked -q -p bijux-dev-atlas -- ops report --allow-write --format json > "${report_root}/ops-readiness.json" 2> "${logs_root}/ops-readiness.stderr.log"
          ops_exit=$?
          set -e
          if [[ "${ops_exit}" -ne 0 ]]; then
            printf '{"schema_version":1,"status":"warn","text":"ops report returned non-zero exit","exit_code":%s}\n' "${ops_exit}" > "${report_root}/ops-readiness-gate.json"
          else
            printf '{"schema_version":1,"status":"ok","text":"ops report completed","exit_code":0}\n' > "${report_root}/ops-readiness-gate.json"
          fi
      - name: Build dist artifacts
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/release-candidate"
          mkdir -p "${report_root}" "${logs_root}"
          cargo run --locked -q -p bijux-dev-atlas -- build dist --allow-subprocess --allow-write --format json > "${report_root}/release-candidate.json" 2> "${logs_root}/release-candidate.stderr.log"
          printf -- "- lane: release-candidate\n- report: %s\n- docs completeness: %s\n- release check: %s\n- release contracts: %s\n- ops readiness: %s\n- input version: %s\n" \
            "${report_root}/release-candidate.json" "${report_root}/docs-completeness.json" "${report_root}/release-check.json" "${report_root}/contracts-release.txt" "${report_root}/ops-readiness.json" "${{ github.event.inputs.version }}" > "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Generate report checksums
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          sha256sum "${report_root}/release-candidate.json" > "${report_root}/release-candidate.sha256"
          sha256sum "${report_root}/docs-completeness.json" > "${report_root}/docs-completeness.sha256"
          sha256sum "${report_root}/release-check.json" > "${report_root}/release-check.sha256"
          sha256sum "${report_root}/ops-readiness.json" > "${report_root}/ops-readiness.sha256"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: release-candidate-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 14
