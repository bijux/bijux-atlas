name: Release Crates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-crates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  publish-crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release commit
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Wait for CI to pass on the tagged commit
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          TARGET_REF_NAME: ${{ github.ref_name }}
        run: |
          CI_WAIT_STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export CI_WAIT_STARTED_AT
          make gh-release-wait-for-ci

      - name: Decide whether to publish crates.io packages
        id: release
        env:
          TARGET_SHA: ${{ github.sha }}
        run: make gh-release-plan-crates

      - name: Set up Rust
        if: ${{ steps.release.outputs.publish == 'true' }}
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0

      - name: Restore the Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: ${{ steps.release.outputs.publish == 'true' }}

      - name: Verify crates.io credentials
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: make gh-release-require-cargo-token

      - name: Publish crates.io packages
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: make publish-rs RUST_PUBLISH_DRY_RUN=0 RUST_PUBLISH_SKIP_EXISTING=1 RUST_PUBLISH_PACKAGES="${{ steps.release.outputs.packages }}"
