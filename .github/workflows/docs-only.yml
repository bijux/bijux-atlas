name: docs-only

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.shared.yml'
      - 'makes/docs.mk'
      - 'docs/contracts/**/*.json'
      - 'docs/_internal/generated/openapi/**'
      - 'configs/generated/openapi/v1/openapi.json'

permissions:
  contents: read

concurrency:
  group: docs-only-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUN_ID: docs-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
  CARGO_TERM_COLOR: always

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NETWORK_ACCESS: required
      ISO_ROOT: artifacts/isolates/docs-only
      CARGO_TARGET_DIR: .cache/cargo/target/docs-only
      CARGO_HOME: .cache/cargo/home/docs-only
      TMPDIR: artifacts/isolates/docs-only/tmp
      TMP: artifacts/isolates/docs-only/tmp
      TEMP: artifacts/isolates/docs-only/tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.86.0
          components: rustfmt
      - name: Normalize temp roots to absolute workspace paths
        shell: bash
        run: |
          set -euo pipefail
          echo "TMPDIR=${GITHUB_WORKSPACE}/${TMPDIR}" >> "${GITHUB_ENV}"
          echo "TMP=${GITHUB_WORKSPACE}/${TMP}" >> "${GITHUB_ENV}"
          echo "TEMP=${GITHUB_WORKSPACE}/${TEMP}" >> "${GITHUB_ENV}"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: configs/sources/repository/docs/package-lock.json
      - name: Prepare cache and temp roots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ISO_ROOT}" "${CARGO_TARGET_DIR}" "${CARGO_HOME}" "${TMPDIR}"
      - name: Prepare run artifact directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "artifacts/${RUN_ID}"
          mkdir -p "artifacts/${RUN_ID}"
      - name: Restore cargo cache
        id: cache-target
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/docs-only
          key: cargo-target-pr-docs-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - name: Install docs toolchain
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r configs/sources/repository/docs/requirements.lock.txt
          npm ci --prefix configs/sources/repository/docs
      - name: Run docs external link check
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- docs external-links --allow-network --format json
      - name: Generate docs references
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- docs reference generate --allow-write --format json
      - name: Check generated docs references
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -q -p bijux-dev-atlas -- docs reference check --allow-subprocess --format json
      - name: Validate mkdocs contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          mkdocs_text = pathlib.Path("mkdocs.yml").read_text()
          shared_text = pathlib.Path("mkdocs.shared.yml").read_text()
          if "assets/javascripts/vendor/mermaid-11.6.0.min.js" not in mkdocs_text:
              raise SystemExit("mkdocs must use the local Mermaid bundle")
          if "custom_dir: docs/overrides" not in shared_text:
              raise SystemExit("mkdocs theme.custom_dir must point at docs/overrides")
          if "docs/hooks/publish_site_assets.py" not in shared_text:
              raise SystemExit("mkdocs must publish root icons via docs/hooks/publish_site_assets.py")
          PY
      - name: Run docs strict build
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/docs-only"
          site_dir="$(python3 - <<'PY'
          import pathlib, yaml
          mkdocs = yaml.safe_load(pathlib.Path("mkdocs.yml").read_text())
          print(mkdocs["site_dir"])
          PY
          )"
          mkdir -p "${report_root}" "${logs_root}"
          python3 -m mkdocs build --strict > "${logs_root}/mkdocs-build.stdout.log" 2> "${logs_root}/mkdocs-build.stderr.log"
          cargo run --locked -q -p bijux-dev-atlas -- ci verify docs-preview --allow-subprocess --allow-write --format json > "${report_root}/mkdocs-build.json" 2>> "${logs_root}/mkdocs-build.stderr.log"
          test -f "${site_dir}/index.html"
          test -d "${site_dir}/assets"
          cp -R "${site_dir}" "artifacts/${RUN_ID}/site-preview"
          rm -rf "artifacts/${RUN_ID}/site-preview/_internal"
      - name: Run docs lane
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          logs_root="artifacts/${RUN_ID}/logs/docs-only"
          mkdir -p "${report_root}" "${logs_root}"
          cargo run --locked -q -p bijux-dev-atlas -- docs validate --allow-write --format json > "${report_root}/docs.json" 2> "${logs_root}/docs.stderr.log"
      - name: Build docs diff summary
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          cargo run --locked -q -p bijux-dev-atlas -- ci verify docs-diff --allow-git --allow-write --format json > "${report_root}/docs-diff-summary.json"
      - name: Publish summary
        shell: bash
        run: |
          set -euo pipefail
          report_root="artifacts/${RUN_ID}/reports"
          printf "- lane: docs\n- report: %s\n- cache target hit: %s\n" \
            "${report_root}/docs.json" "${{ steps.cache-target.outputs.cache-hit || 'false' }}" > "artifacts/${RUN_ID}/summary.md"
          printf "- docs diff: %s\n" "${report_root}/docs-diff-summary.json" >> "artifacts/${RUN_ID}/summary.md"
          cat "artifacts/${RUN_ID}/summary.md" >> "${GITHUB_STEP_SUMMARY}"
      - name: Save cargo cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: .cache/cargo/target/docs-only
          key: cargo-target-pr-docs-${{ runner.os }}-1.86.0-${{ hashFiles('Cargo.lock') }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: docs-preview-site-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}/site-preview
          retention-days: 5

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: docs-${{ env.RUN_ID }}
          path: artifacts/${{ env.RUN_ID }}
          retention-days: 5
