schema_version = 1
release_line = "v0.1"

[distribution]
primary = "oci-helm-chart"
registry = "ghcr.io"
chart_reference = "oci://ghcr.io/bijux/charts/bijux-atlas"

[version_policy]
chart = "release-version"
profiles_bundle = "release-version"

[artifacts]
include = [
  "ops/k8s/charts/bijux-atlas/Chart.yaml",
  "ops/k8s/charts/bijux-atlas/values.yaml",
  "ops/k8s/charts/bijux-atlas/values.schema.json",
  "ops/inventory",
  "ops/k8s/values",
  "ops/evidence/schema/v1/ops-evidence-bundle.schema.json",
  "ops/k8s/tests/goldens/render-kind.summary.json",
  "ops/report/generated/ops-values-coverage.json",
  "ops/report/generated/ops-artifact-lineage.json",
  "ops/report/generated/release-evidence-bundle.json",
  "docs/operations/release-provenance.md",
  "docs/operations/ops-provenance.md",
  "release/evidence/ops-distribution"
]
checksum = "sha256"

[chart]
path = "ops/k8s/charts/bijux-atlas"

[package]
output_dir = "artifacts/release/ops/package"

[pipeline]
require_helm_lint = true
require_schema_validation = true
require_install_evidence_bundle = true

[bundle]
name_prefix = "ops-bundle"
output_dir = "artifacts/release/ops/bundle"
offline_required = true
include_tool_version_requirements = true
include_compatibility_notes = true
