schema_version: 1
default_stance: internal
auth_support: supported
supported_methods:
  - api-key
  - token
  - oidc
  - mtls
runtime_auth_mode_env: ATLAS_AUTH_MODE
recommended_auth_placement:
  - ingress-proxy
  - service-mesh
  - built-in
deployment_boundary_requirement: Atlas must remain behind an ingress auth proxy or equivalent institutional boundary when exposed beyond a private trusted network.
docs:
  model: docs/bijux-atlas-ops/kubernetes/security-operations.md
  protocol_options: docs/bijux-atlas-ops/kubernetes/security-operations.md
  runbook: docs/bijux-atlas-ops/kubernetes/security-operations.md
