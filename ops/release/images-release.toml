schema_version = 1
release_line = "v0.2"

[[images]]
name = "ghcr.io/bijux/bijux-atlas-server"
role = "runtime-server"
version_binding = "workspace-version"
tag_policy = ["vX.Y.Z", "sha-<short>"]
allow_latest = false
support_window = "180d"
platforms = ["linux/amd64", "linux/arm64"]

[policy]
multi_arch_required = true
forbid_latest_tag = true

[base_image_pinning]
require_digest_pins = true
lockfile = "ops/docker/bases.lock"
