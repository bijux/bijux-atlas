schema_version: 1
controls:
  - id: CTRL-AUTH-001
    category: access-control
    title: Auth stance, policy vocabulary, and deployment boundary are explicit and reviewable.
  - id: CTRL-AUDIT-001
    category: audit
    title: Audit logging, retention, and verification artifacts are governed for release review.
  - id: CTRL-PRIV-001
    category: privacy
    title: Sensitive field classification and redaction posture are documented and enforced.
  - id: CTRL-LOG-001
    category: logging
    title: Structured logging is governed and reviewable.
  - id: CTRL-EVID-001
    category: provenance
    title: Release evidence is reproducible and complete.
  - id: CTRL-NP-001
    category: network
    title: Network policy posture is explicit and enforced.
  - id: CTRL-OBS-001
    category: observability
    title: Metrics, logs, and error contracts are validated before release.
