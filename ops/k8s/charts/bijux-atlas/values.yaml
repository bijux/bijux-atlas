image:
  repository: ghcr.io/bijux/bijux-atlas
  tag: "0.1.0"
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 2

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 20
  cpu:
    targetAverageUtilization: 70
  memory:
    targetAverageUtilization: 80

service:
  type: ClusterIP
  port: 8080
  nodePort: null

ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  authProxy:
    enabled: false
    annotations: {}
    passThroughHeaders: []

audit:
  enabled: false
  sink: stdout

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "2Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"
    ephemeral-storage: "10Gi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

cache:
  enabled: true
  storageMode: emptyDir
  diskSize: 8Gi
  tmpSize: 512Mi
  maxDatasetCount: 8
  maxDiskBytes: 8589934592
  pvc:
    enabled: false
    storageClassName: ""
    size: 8Gi
  pinnedDatasets: []
  warmupEnabled: false
  warmupFailReadinessOnMissing: false
  startupWarmupJitterMaxMs: 30000
  maxConcurrentDownloads: 3
  initPrewarm:
    enabled: false
    image: ghcr.io/bijux/bijux-atlas:0.1.0
  cachedOnlyMode: false
  readinessRequiresCatalog: true
  warmup:
    enabled: false
    lockTtlSeconds: 60
    retry:
      maxAttempts: 5
      baseDelayMs: 250
      maxDelayMs: 2000

server:
  bindAddress: 0.0.0.0
  port: 8080
  publicPathPrefix: /
  log:
    level: info
    format: json
  adminEndpoints:
    enabled: false
  timeouts:
    readMs: 5000
    writeMs: 5000
    requestMs: 5000
  shutdown:
    graceSeconds: 30
  cors:
    enabled: false
    allowedOrigins: []
  http:
    maxBodyBytes: 16384
    maxHeaderBytes: 8192
  command:
    - /app/bijux-atlas
    - atlas
    - serve
  configSchemaVersion: v1
  startupProbePath: /readyz
  readinessProbePath: /readyz
  requestTimeoutMs: 5000
  sqlTimeoutMs: 800
  responseMaxBytes: 524288
  maxBodyBytes: 16384
  slowQueryThresholdMs: 200
  enableDebugDatasets: false
  enableExemplars: false
  cachedOnlyMode: false
  readOnlyFsMode: false
  shutdownDrainMs: 5000
  readinessRequiresCatalog: true
  maxSequenceBases: 20000
  sequenceApiKeyRequiredBases: 5000
  sequenceTtlMs: 300000

probes:
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  startup:
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 12

sequenceRateLimits:
  perIp:
    capacity: 15
    refillPerSec: 5

catalog:
  endpoint: ""
  etagEnabled: true
  backoffBaseMs: 250
  breakerFailureThreshold: 5
  breakerOpenMs: 5000

store:
  backend: local
  endpoint: ""
  s3PresignedBaseUrl: ""
  credentialsSecretName: ""
  manageCredentialsSecret: true
  s3:
    endpoint: ""
    bucket: ""
    region: us-east-1
    pathStyle: false
    credentials:
      fromSecret: ""
  http:
    baseUrl: ""
    timeoutMs: 5000
  local:
    path: /cache

networkPolicy:
  enabled: true
  mode: internet-only
  ingressMode: same-namespace
  cidrBudget:
    maxAllowCidrs: 8
  exceptions:
    relaxedEgress: false
    prodDisableAllowed: false
    owner: ""
    expiresOn: ""
  allowDns: true
  allowMonitoringNamespace: observability
  monitoring:
    allowNamespace: observability
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
    customRules: []
  egress:
    mode: internet-only
    allowDns: true
    allowCidrs: []
    allowNamespaces: []
    customRules: []
  dependencies:
    redis:
      enabled: false
      ports: [6379]
    minio:
      enabled: false
      ports: [9000]
    catalog:
      enabled: false
      ports: [80, 443]
    otel:
      enabled: false
      ports: [4317, 4318]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 5s
  labels: {}

metrics:
  enabled: true
  path: /metrics
  port: 8080
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 5s
    labels: {}
  customMetrics:
    enabled: true
    requiredPodAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"

alertRules:
  enabled: true
  runbookUrlBase: "https://github.com/bijux/bijux-atlas/blob/main/"

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 20
  cpuUtilization: 70
  p95LatencySeconds: "0.300"
  heavyInflightAverageValue: "8"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60

pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: null

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

priorityClassName: ""

terminationGracePeriodSeconds: 30

nodeLocalSsdProfile:
  enabled: false
  note: "Prefer node-local SSD for /cache and benchmark p95 gains before rollout."

rollout:
  enabled: false
  steps:
    - setWeight: 10
    - pause:
        duration: 60s
    - setWeight: 50
    - pause:
        duration: 120s

catalogPublishJob:
  enabled: false
  backoffLimit: 1
  image: ghcr.io/bijux/bijux-atlas:0.1.0
  command:
    - /app/atlas-cli
    - ingest

datasetWarmupJob:
  enabled: false
  backoffLimit: 1
  image: ghcr.io/bijux/bijux-atlas:0.1.0

extraEnv: []
envFromSecrets: []
configMounts: []
extraLabels: {}
extraAnnotations: {}
initContainers: []
extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
