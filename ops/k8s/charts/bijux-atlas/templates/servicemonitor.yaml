{{- $serviceMonitor := (.Values.metrics.serviceMonitor | default .Values.serviceMonitor) }}
{{- if and .Values.metrics.enabled $serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "bijux-atlas.fullname" . }}
  labels:
    {{- include "bijux-atlas.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
    observability.bijux.atlas/scrape: "true"
    {{- with $serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bijux-atlas.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $serviceMonitor.interval }}
      scrapeTimeout: {{ $serviceMonitor.scrapeTimeout }}
{{- end }}
