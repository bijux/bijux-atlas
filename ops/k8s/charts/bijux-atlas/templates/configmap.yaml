apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bijux-atlas.fullname" . }}-config
  labels:
    {{- include "bijux-atlas.labels" . | nindent 4 }}
{{- $cachedOnlyMode := .Values.server.cachedOnlyMode }}
{{- if hasKey .Values.cache "cachedOnlyMode" }}
{{- $cachedOnlyMode = .Values.cache.cachedOnlyMode }}
{{- end }}
{{- $readinessRequiresCatalog := .Values.server.readinessRequiresCatalog }}
{{- if hasKey .Values.cache "readinessRequiresCatalog" }}
{{- $readinessRequiresCatalog = .Values.cache.readinessRequiresCatalog }}
{{- end }}
data:
  ATLAS_STORE_S3_ENABLED: {{ if .Values.store.endpoint }}"true"{{ else }}"false"{{ end }}
  ATLAS_STORE_S3_BASE_URL: {{ .Values.store.endpoint | quote }}
  ATLAS_STORE_S3_PRESIGNED_BASE_URL: {{ .Values.store.s3PresignedBaseUrl | quote }}
  ATLAS_MAX_DATASET_COUNT: {{ .Values.cache.maxDatasetCount | quote }}
  ATLAS_MAX_DISK_BYTES: {{ .Values.cache.maxDiskBytes | quote }}
  ATLAS_PINNED_DATASETS: {{ join "," .Values.cache.pinnedDatasets | quote }}
  ATLAS_MAX_CONCURRENT_DOWNLOADS: {{ .Values.cache.maxConcurrentDownloads | quote }}
  ATLAS_STARTUP_WARMUP_JITTER_MAX_MS: {{ .Values.cache.startupWarmupJitterMaxMs | quote }}
  ATLAS_REQUEST_TIMEOUT_MS: {{ .Values.server.requestTimeoutMs | quote }}
  ATLAS_SQL_TIMEOUT_MS: {{ .Values.server.sqlTimeoutMs | quote }}
  ATLAS_RESPONSE_MAX_BYTES: {{ .Values.server.responseMaxBytes | quote }}
  ATLAS_MAX_BODY_BYTES: {{ .Values.server.maxBodyBytes | quote }}
  ATLAS_SLOW_QUERY_THRESHOLD_MS: {{ .Values.server.slowQueryThresholdMs | quote }}
  ATLAS_ENABLE_DEBUG_DATASETS: {{ .Values.server.enableDebugDatasets | quote }}
  ATLAS_ENABLE_EXEMPLARS: {{ .Values.server.enableExemplars | quote }}
  ATLAS_CACHED_ONLY_MODE: {{ $cachedOnlyMode | quote }}
  ATLAS_READ_ONLY_FS_MODE: {{ .Values.server.readOnlyFsMode | quote }}
  ATLAS_SHUTDOWN_DRAIN_MS: {{ .Values.server.shutdownDrainMs | quote }}
  ATLAS_READINESS_REQUIRES_CATALOG: {{ $readinessRequiresCatalog | quote }}
  ATLAS_MAX_SEQUENCE_BASES: {{ .Values.server.maxSequenceBases | quote }}
  ATLAS_SEQUENCE_API_KEY_REQUIRED_BASES: {{ .Values.server.sequenceApiKeyRequiredBases | quote }}
  ATLAS_SEQUENCE_TTL_MS: {{ .Values.server.sequenceTtlMs | quote }}
  ATLAS_SEQUENCE_RATE_LIMIT_CAPACITY: {{ .Values.sequenceRateLimits.perIp.capacity | quote }}
  ATLAS_SEQUENCE_RATE_LIMIT_REFILL_PER_SEC: {{ .Values.sequenceRateLimits.perIp.refillPerSec | quote }}
  ATLAS_CATALOG_BACKOFF_BASE_MS: {{ .Values.catalog.backoffBaseMs | quote }}
  ATLAS_CATALOG_BREAKER_FAILURE_THRESHOLD: {{ .Values.catalog.breakerFailureThreshold | quote }}
  ATLAS_CATALOG_BREAKER_OPEN_MS: {{ .Values.catalog.breakerOpenMs | quote }}
