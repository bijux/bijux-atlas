{{- if .Values.networkPolicy.enabled }}
{{- $egressMode := "internet-only" }}
{{- if and .Values.networkPolicy.egress (hasKey .Values.networkPolicy.egress "mode") }}
{{- $egressMode = .Values.networkPolicy.egress.mode }}
{{- end }}
{{- $allowDns := .Values.networkPolicy.allowDns }}
{{- if and .Values.networkPolicy.egress (hasKey .Values.networkPolicy.egress "allowDns") }}
{{- $allowDns = .Values.networkPolicy.egress.allowDns }}
{{- end }}
{{- $allowCidrs := .Values.networkPolicy.allowedEgressCIDRs }}
{{- if and .Values.networkPolicy.egress (hasKey .Values.networkPolicy.egress "allowCidrs") }}
{{- $allowCidrs = .Values.networkPolicy.egress.allowCidrs }}
{{- end }}
{{- $allowNamespaces := list }}
{{- if and .Values.networkPolicy.egress (hasKey .Values.networkPolicy.egress "allowNamespaces") }}
{{- $allowNamespaces = .Values.networkPolicy.egress.allowNamespaces }}
{{- end }}
{{- $ingressMode := "same-namespace" }}
{{- if and .Values.networkPolicy.ingress (hasKey .Values.networkPolicy.ingress "mode") }}
{{- $ingressMode = .Values.networkPolicy.ingress.mode }}
{{- end }}
{{- $ingressAllowNamespaces := list }}
{{- if and .Values.networkPolicy.ingress (hasKey .Values.networkPolicy.ingress "allowNamespaces") }}
{{- $ingressAllowNamespaces = .Values.networkPolicy.ingress.allowNamespaces }}
{{- end }}
{{- $enableEgress := ne $egressMode "disabled" }}
{{- $enableIngress := ne $ingressMode "disabled" }}
{{- $hasInternetCidrs := and (eq $egressMode "internet-only") (gt (len $allowCidrs) 0) }}
{{- $clusterPorts := list }}
{{- if .Values.networkPolicy.dependencies.redis.enabled }}
{{- range .Values.networkPolicy.dependencies.redis.ports }}
{{- $clusterPorts = append $clusterPorts . }}
{{- end }}
{{- end }}
{{- if .Values.networkPolicy.dependencies.minio.enabled }}
{{- range .Values.networkPolicy.dependencies.minio.ports }}
{{- $clusterPorts = append $clusterPorts . }}
{{- end }}
{{- end }}
{{- if .Values.networkPolicy.dependencies.catalog.enabled }}
{{- range .Values.networkPolicy.dependencies.catalog.ports }}
{{- $clusterPorts = append $clusterPorts . }}
{{- end }}
{{- end }}
{{- if .Values.networkPolicy.dependencies.otelCollector.enabled }}
{{- range .Values.networkPolicy.dependencies.otelCollector.ports }}
{{- $clusterPorts = append $clusterPorts . }}
{{- end }}
{{- end }}
{{- $hasClusterRules := and (eq $egressMode "cluster-aware") (and (gt (len $allowNamespaces) 0) (gt (len $clusterPorts) 0)) }}
{{- $hasAutoRules := or $allowDns (or $hasInternetCidrs $hasClusterRules) }}
{{- $hasSelectedIngress := and (eq $ingressMode "selected") (gt (len $ingressAllowNamespaces) 0) }}
{{- $hasIngressRules := or (eq $ingressMode "same-namespace") $hasSelectedIngress }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bijux-atlas.fullname" . }}
  labels:
    {{- include "bijux-atlas.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bijux-atlas.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    {{- if $enableIngress }}
    - Ingress
    {{- end }}
    {{- if $enableEgress }}
    - Egress
    {{- end }}
  {{- if $enableIngress }}
  {{- if not $hasIngressRules }}
  ingress: []
  {{- else }}
  ingress:
    {{- if eq $ingressMode "same-namespace" }}
    # same-namespace: permit only in-namespace clients, deny cross-namespace ingress by default.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- else if eq $ingressMode "selected" }}
    # selected: allow ingress only from explicitly named namespaces.
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  {{- range $ingressAllowNamespaces }}
                  - {{ . | quote }}
                  {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- else if eq $ingressMode "custom" }}
    # custom: no automatic ingress rules are emitted; operators must supply custom policy overlays.
    {{- end }}
  {{- end }}
  {{- end }}
  {{- if $enableEgress }}
  {{- if not $hasAutoRules }}
  egress: []
  {{- else }}
  egress:
    {{- if $allowDns }}
    # Allow kube-dns lookups so name resolution remains available for permitted egress paths.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if eq $egressMode "internet-only" }}
    # internet-only: permit outbound HTTP(S) only to explicitly allowed CIDRs.
    {{- range $allowCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    {{- end }}
    {{- else if eq $egressMode "cluster-aware" }}
    # cluster-aware: permit dependency traffic by namespace selection, never by hardcoded service CIDRs.
    {{- if gt (len $allowNamespaces) 0 }}
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  {{- range $allowNamespaces }}
                  - {{ . | quote }}
                  {{- end }}
      ports:
        {{- range $clusterPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    {{- else if eq $egressMode "custom" }}
    # custom: no automatic egress rules are emitted; operators must supply custom policy overlays.
    {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
