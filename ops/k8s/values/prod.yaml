replicaCount: 3

networkPolicy:
  enabled: true
  allowDns: true
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
