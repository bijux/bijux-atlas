image:
  tag: ""
  digest: "sha256:5555555555555555555555555555555555555555555555555555555555555555"

server:
  cachedOnlyMode: true
  readinessRequiresCatalog: false

networkPolicy:
  enabled: true
  allowDns: false
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
  egress:
    mode: disabled
    allowDns: false
    allowCidrs: []
    allowNamespaces: []
  dependencies:
    redis:
      enabled: false
      ports: [6379]
    minio:
      enabled: false
      ports: [9000]
    catalog:
      enabled: false
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

store:
  endpoint: ""

cache:
  pinnedDatasets:
    - 110/homo_sapiens/GRCh38
  warmupEnabled: true
  initPrewarm:
    enabled: true

hpa:
  enabled: false
