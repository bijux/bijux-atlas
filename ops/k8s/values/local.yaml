replicaCount: 1

image:
  repository: ghcr.io/bijux/bijux-atlas
  tag: ""
  digest: "sha256:db683a63110a7310ab949a21231845a9abce1aec04c05edbc44023875a9e4adb"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080
  nodePort: 30080

cache:
  warmupEnabled: true
  pinnedDatasets: []

catalog:
  endpoint: "http://minio.atlas-e2e.svc.cluster.local:9000/atlas-artifacts/catalog.json"

store:
  endpoint: "http://minio.atlas-e2e.svc.cluster.local:9000/atlas-artifacts"
  s3PresignedBaseUrl: ""
  credentialsSecretName: ""

server:
  configSchemaVersion: v1
  enableDebugDatasets: true
  cachedOnlyMode: false
  readinessRequiresCatalog: false
  startupProbePath: /healthz
  readinessProbePath: /healthz

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 5s
    labels: {}
  customMetrics:
    enabled: false
    requiredPodAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"

alertRules:
  enabled: false

hpa:
  enabled: false

pdb:
  enabled: false

networkPolicy:
  enabled: false
  allowDns: false
  allowedEgressCIDRs: []
  ingress:
    mode: disabled
    allowNamespaces: []
  egress:
    mode: disabled
    allowDns: false
    allowCidrs: []
    allowNamespaces: []
  dependencies:
    redis:
      enabled: false
      ports: [6379]
    minio:
      enabled: false
      ports: [9000]
    catalog:
      enabled: false
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]
