# Shared operator baseline for profile overlays.
# Helm still merges each profile with chart defaults in `ops/k8s/charts/bijux-atlas/values.yaml`;
# this file records the common operating intent so profile files only keep deliberate differences.
server:
  configSchemaVersion: v1

networkPolicy:
  enabled: true
  allowDns: true
  allowMonitoringNamespace: observability
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
    customRules: []
  egress:
    mode: internet-only
    allowDns: true
    allowCidrs: []
    allowNamespaces: []
    customRules: []
  dependencies:
    redis:
      enabled: false
      ports: [6379]
    minio:
      enabled: false
      ports: [9000]
    catalog:
      enabled: false
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]
