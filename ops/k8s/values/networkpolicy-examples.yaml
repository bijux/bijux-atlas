# Example: disabled
# networkPolicy:
#   enabled: false
#   allowDns: false
#   allowMonitoringNamespace: ""
#   allowedEgressCIDRs: []
#   ingress:
#     mode: disabled
#     allowNamespaces: []
#     customRules: []
#   egress:
#     mode: disabled
#     allowDns: false
#     allowCidrs: []
#     allowNamespaces: []
#     customRules: []
#
# Example: internet-only
# networkPolicy:
#   enabled: true
#   allowDns: true
#   allowMonitoringNamespace: observability
#   allowedEgressCIDRs: []
#   ingress:
#     mode: same-namespace
#     allowNamespaces: []
#     customRules: []
#   egress:
#     mode: internet-only
#     allowDns: true
#     allowCidrs:
#       - 203.0.113.10/32
#       - 198.51.100.0/24
#     allowNamespaces: []
#     customRules: []
#
# Example: cluster-aware
networkPolicy:
  enabled: true
  allowDns: true
  allowMonitoringNamespace: observability
  allowedEgressCIDRs: []
  ingress:
    mode: selected
    allowNamespaces:
      - observability
    customRules: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
      - observability
    customRules: []
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: true
      ports: [4317, 4318]
#
