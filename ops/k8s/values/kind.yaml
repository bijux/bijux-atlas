rollout:
  enabled: true

service:
  type: NodePort
  nodePort: 30080

cache:
  pvc:
    enabled: false

networkPolicy:
  enabled: true
  mode: cluster-aware
  cidrBudget:
    maxAllowCidrs: 4
  exceptions:
    relaxedEgress: false
    prodDisableAllowed: false
    owner: ""
    expiresOn: ""
  allowDns: true
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]
