image:
  tag: ""
  digest: "sha256:3333333333333333333333333333333333333333333333333333333333333333"

replicaCount: 4

networkPolicy:
  enabled: true
  mode: cluster-aware
  exceptions:
    relaxedEgress: false
    prodDisableAllowed: false
    owner: ""
    expiresOn: ""
  allowDns: true
  monitoring:
    allowNamespace: observability
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
    customRules: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
    customRules: []
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 16

pdb:
  enabled: true
  minAvailable: 2

probes:
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 4
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 8
