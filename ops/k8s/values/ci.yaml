replicaCount: 2

server:
  configSchemaVersion: v1
  cachedOnlyMode: true
  readinessRequiresCatalog: false

networkPolicy:
  enabled: true
  allowDns: false
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
  egress:
    mode: disabled
    allowDns: false
    allowCidrs: []
    allowNamespaces: []
  dependencies:
    redis:
      enabled: false
      ports: [6379]
    minio:
      enabled: false
      ports: [9000]
    catalog:
      enabled: false
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

hpa:
  enabled: false
