image:
  tag: ""
  digest: "sha256:2222222222222222222222222222222222222222222222222222222222222222"

replicaCount: 2

networkPolicy:
  enabled: true
  mode: cluster-aware
  ingressMode: same-namespace
  exceptions:
    relaxedEgress: false
    prodDisableAllowed: false
    owner: ""
    expiresOn: ""
  allowDns: true
  allowMonitoringNamespace: observability
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
    customRules: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
    customRules: []
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
