image:
  tag: ""
  digest: "sha256:1111111111111111111111111111111111111111111111111111111111111111"

replicaCount: 3

resources:
  requests:
    cpu: "1000m"
    memory: "1Gi"
  limits:
    cpu: "3000m"
    memory: "3Gi"

cache:
  maxDatasetCount: 12
  maxDiskBytes: 17179869184
  maxConcurrentDownloads: 4

server:
  readinessProbePath: /healthz/overload
  responseMaxBytes: 786432
  sqlTimeoutMs: 1200
  slowQueryThresholdMs: 300

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  cpuUtilization: 65

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 5s
    labels: {}
  customMetrics:
    enabled: true
    requiredPodAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/metrics"

networkPolicy:
  enabled: true
  mode: cluster-aware
  exceptions:
    relaxedEgress: false
    prodDisableAllowed: false
    owner: ""
    expiresOn: ""
  allowDns: true
  allowedEgressCIDRs: []
  ingress:
    mode: same-namespace
    allowNamespaces: []
  egress:
    mode: cluster-aware
    allowDns: true
    allowCidrs: []
    allowNamespaces:
      - atlas-deps
  dependencies:
    redis:
      enabled: true
      ports: [6379]
    minio:
      enabled: true
      ports: [9000]
    catalog:
      enabled: true
      ports: [80, 443]
    otelCollector:
      enabled: false
      ports: [4317, 4318]
