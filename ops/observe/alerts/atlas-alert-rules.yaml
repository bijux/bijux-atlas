apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bijux-atlas-observability-alerts
  labels:
    subsystem: atlas
    contract_version: "1"
    contract_git_sha: "REQUIRED_AT_BUILD"
  annotations:
    contact: "ops@bijux.local"
    runbook_index: "docs/operations/runbooks/INDEX.md"
spec:
  groups:
  - name: bijux-atlas-slo
    rules:
      - alert: BijuxAtlasHigh5xxRate
        expr: |
          (
            sum(rate(bijux_http_requests_total{subsystem="atlas",status=~"5.."}[5m]))
            /
            sum(rate(bijux_http_requests_total{subsystem="atlas"}[5m]))
          ) > 0.005
        for: 10m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "High 5xx error rate"
          description: "5xx ratio exceeded 0.5% over 10m."
          runbook: "docs/operations/runbooks/incident-playbook.md"
      - alert: BijuxAtlasP95LatencyRegression
        expr: bijux_http_request_latency_p95_seconds{subsystem="atlas",route="/v1/genes"} > 0.8
        for: 15m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "v1/genes p95 latency above SLO"
          description: "p95 latency above 800ms for 15m."
          runbook: "docs/operations/runbooks/incident-playbook.md"
      - alert: BijuxAtlasStoreDownloadFailures
        expr: increase(bijux_store_download_failure_total{subsystem="atlas"}[10m]) > 5
        for: 10m
        labels:
          severity: warn
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Store download failures elevated"
          description: "More than 5 store download failures in 10m."
          runbook: "docs/operations/runbooks/store-outage.md"
      - alert: BijuxAtlasCacheThrash
        expr: |
          rate(bijux_dataset_misses{subsystem="atlas"}[10m])
          >
          3 * rate(bijux_dataset_hits{subsystem="atlas"}[10m])
        for: 15m
        labels:
          severity: warn
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Cache thrash detected"
          description: "Dataset miss rate is significantly higher than hit rate."
          runbook: "docs/operations/runbooks/store-outage.md"
      - alert: AtlasOverloadSustained
        expr: avg_over_time(atlas_overload_active{subsystem="atlas"}[90s]) > 0
        for: 90s
        labels:
          severity: warn
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Sustained overload shedding active"
          description: "Overload remained active for more than 90 seconds."
          runbook: "docs/operations/runbooks/traffic-spike.md"
      - alert: BijuxAtlasIngestFailures
        expr: increase(atlas_ingest_failure_total{subsystem="atlas"}[10m]) > 0
        for: 10m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Ingest failures detected"
          description: "One or more ingest failures occurred in the last 10 minutes."
          runbook: "docs/operations/runbooks/ingest-failures.md"
      - alert: BijuxAtlasQueryErrorSpike
        expr: |
          (
            sum(rate(bijux_http_requests_total{subsystem="atlas",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(bijux_http_requests_total{subsystem="atlas"}[5m])), 1)
          ) > 0.01
        for: 10m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Query error spike"
          description: "API error ratio exceeded 1% for 10 minutes."
          runbook: "docs/operations/runbooks/high-error-rate.md"
      - alert: BijuxAtlasShardIntegrityViolation
        expr: increase(atlas_shard_integrity_violation_total{subsystem="atlas"}[10m]) > 0
        for: 5m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Shard integrity violation"
          description: "One or more shard integrity violations occurred."
          runbook: "docs/operations/runbooks/integrity-violation.md"
      - alert: BijuxAtlasDiskSpaceLow
        expr: atlas_disk_free_bytes{subsystem="atlas"} < 10737418240
        for: 15m
        labels:
          severity: warn
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Disk space low"
          description: "Disk free space is below 10 GiB for 15 minutes."
          runbook: "docs/operations/runbooks/disk-pressure.md"
      - alert: BijuxAtlasRestartLoop
        expr: increase(kube_pod_container_status_restarts_total{namespace="atlas-dev",container="bijux-atlas"}[10m]) > 3
        for: 10m
        labels:
          severity: page
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "Restart loop detected"
          description: "Container restarts exceeded 3 in 10 minutes."
          runbook: "docs/operations/runbooks/restart-loop.md"
      - alert: BijuxAtlasNoDatasetsLoaded
        expr: atlas_loaded_datasets{subsystem="atlas"} == 0
        for: 15m
        labels:
          severity: warn
          subsystem: atlas
          alert_contract_version: "1"
        annotations:
          summary: "No datasets loaded"
          description: "Service is running with no datasets loaded for 15 minutes."
          runbook: "docs/operations/runbooks/ingest-failures.md"
